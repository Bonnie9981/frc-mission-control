<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRC Mission Control v10 | The Foundation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');
        body { background: #0a0f1e; color: #d1d5db; font-family: 'Fira Code', monospace; }
        .course-card { background: #111827; border: 1px solid #1f2937; transition: 0.2s; }
        .course-card:hover { border-color: #3b82f6; transform: translateY(-2px); }
        .badge-java { background: #431407; color: #fb923c; font-size: 0.7rem; padding: 2px 8px; rounded: 4px; }
        .badge-frc { background: #1e3a8a; color: #93c5fd; font-size: 0.7rem; padding: 2px 8px; rounded: 4px; }
        .task-item { border-left: 2px solid #374151; padding-left: 1rem; margin-bottom: 0.5rem; }
        .task-item.done { border-left-color: #10b981; opacity: 0.6; }
        .code-block { background: #000; color: #10b981; padding: 1rem; border-radius: 0.5rem; font-size: 0.85rem; margin: 1rem 0; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-4xl mx-auto mb-10">
        <div class="flex justify-between items-end border-b border-slate-800 pb-4">
            <div>
                <h1 class="text-3xl font-black text-white tracking-tight">FOUNDATION_v10</h1>
                <p class="text-blue-500 font-bold">從零開始的工程師修煉路徑</p>
            </div>
            <div class="text-right">
                <p class="text-xs text-slate-500 uppercase">Training Progress</p>
                <span id="globalProgress" class="text-2xl font-black text-green-500">0%</span>
            </div>
        </div>
    </header>

    <main id="app" class="max-w-4xl mx-auto space-y-10">
        </main>

    <div id="challengeModal" class="hidden fixed inset-0 bg-black/95 z-50 flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-blue-500 p-6 rounded-xl max-w-md w-full">
            <h2 id="modalTitle" class="text-xl font-bold text-blue-400 mb-4">代碼實驗室</h2>
            <p id="modalDesc" class="text-sm text-slate-400 mb-4"></p>
            <div id="modalCode" class="code-block mb-4"></div>
            <input id="modalInput" class="w-full bg-black border border-slate-700 p-3 rounded mb-4 text-green-500 outline-none focus:border-blue-500" placeholder="你的答案...">
            <div class="flex space-x-2">
                <button onclick="checkChallenge()" class="flex-1 bg-blue-600 py-2 rounded font-bold hover:bg-blue-500 transition">提交驗證</button>
                <button onclick="closeModal()" class="flex-1 bg-slate-800 py-2 rounded font-bold hover:bg-slate-700 transition">取消</button>
            </div>
        </div>
    </div>

<script>
// ===== v10 完整工程師架構資料庫 =====
const curriculum = [
    {
        id: "p1",
        phase: "Phase -1: Java 核心基礎",
        description: "不碰機器人，先學會如何指揮電腦。這是所有代碼的起點。",
        missions: [
            {
                id: "v_basic",
                title: "1. 變數與容器",
                badge: "JAVA",
                tasks: [
                    "理解 int (整數) 與 double (小數) 的差異",
                    "練習：建立 int port = 1; 並理解其意義",
                    "練習：建立 double speed = 0.5; (馬達通常用這個)",
                    "💥 實驗：嘗試把 'Hello' 存進 int 變數，看看會發生什麼？",
                    "🧠 思考：為什麼馬達速度不用 int 而要用 double？"
                ],
                challenge: {
                    title: "型態挑戰",
                    desc: "在 Java 中，如果要儲存馬達的『速度百分比』（例如 0.75），該使用哪種資料型態？",
                    code: "_____ motorSpeed = 0.75;",
                    key: "double"
                }
            },
            {
                id: "v_logic",
                title: "2. 邏輯判斷 (if)",
                badge: "JAVA",
                tasks: [
                    "理解 if (條件) { 做事 } 的基本結構",
                    "練習：寫出判斷按鈕是否按下的代碼",
                    "理解 == (等於) 與 = (賦值) 的致命差異",
                    "💥 實驗：故意少寫一個括號 }，觀察報錯訊息",
                    "🧠 思考：如果機器人要偵測距離物體 < 10cm 就停下，if 該怎麼寫？"
                ],
                challenge: {
                    title: "條件分支挑戰",
                    desc: "請填入缺少的關鍵字，讓程式在按鈕 A 被按下時印出訊息：",
                    code: "____ (buttonA == true) {\n  System.out.println(\"Pressed!\");\n}",
                    key: "if"
                }
            }
        ]
    },
    {
        id: "p2",
        phase: "Phase 0: FRC 實戰啟航",
        description: "現在你有 Java 基礎了，我們來看看這些代碼如何驅動鋼鐵。",
        missions: [
            {
                id: "frc_setup",
                title: "3. WPILib 環境與專案",
                badge: "FRC",
                tasks: [
                    "安裝 WPILib Installer (包含 Java JDK)",
                    "建立一個 Timed Robot 專案",
                    "找到 Robot.java 並理解其生命週期 (Init -> Periodic)",
                    "點擊 Build Project 並確認出現 BUILD SUCCESSFUL",
                    "💥 實驗：在 Robot.java 隨便打錯一個字，觀察編譯器的哀嚎"
                ],
                challenge: {
                    title: "編譯挑戰",
                    desc: "將 Java 代碼轉成機器人能懂的二進位檔案，這個過程稱為什麼？",
                    code: "> Task :compileJava _____ ",
                    key: "build"
                }
            }
        ]
    }
];

let progress = JSON.parse(localStorage.getItem("v10_progress") || "{}");
let activeChallenge = null;

function render() {
    const app = document.getElementById("app");
    let totalTasks = 0;
    let doneTasks = 0;

    app.innerHTML = curriculum.map(p => `
        <section class="space-y-6">
            <div class="border-l-4 border-blue-600 pl-4">
                <h2 class="text-2xl font-black text-white italic">${p.phase}</h2>
                <p class="text-sm text-slate-500">${p.description}</p>
            </div>
            
            <div class="grid md:grid-cols-2 gap-4">
                ${p.missions.map(m => {
                    const mProgress = progress[m.id] || { tasks: [], solved: false };
                    totalTasks += m.tasks.length;
                    doneTasks += mProgress.tasks.length;

                    return `
                    <div class="course-card p-5 rounded-xl flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-center mb-4">
                                <span class="${m.badge === 'JAVA' ? 'badge-java' : 'badge-frc'} font-bold rounded px-2 py-0.5 text-[10px] tracking-widest">${m.badge}</span>
                                <span class="text-[10px] text-slate-600">${mProgress.tasks.length}/${m.tasks.length} DONE</span>
                            </div>
                            <h3 class="text-lg font-bold text-slate-200 mb-4">${m.title}</h3>
                            <div class="space-y-2 mb-6">
                                ${m.tasks.map((t, i) => `
                                    <div class="task-item text-xs ${mProgress.tasks.includes(i) ? 'done' : ''} flex items-center justify-between">
                                        <span>${t}</span>
                                        <input type="checkbox" ${mProgress.tasks.includes(i) ? 'checked' : ''} 
                                            onchange="toggleTask('${m.id}', ${i})" class="ml-2 accent-blue-500">
                                    </div>
                                `).join("")}
                            </div>
                        </div>
                        
                        <button onclick="openChallenge('${p.id}', '${m.id}')" 
                            class="w-full py-2 rounded text-xs font-bold transition ${mProgress.solved ? 'bg-green-900/50 text-green-400 border border-green-800' : 'bg-blue-900/50 text-blue-400 border border-blue-800 hover:bg-blue-800 hover:text-white'}">
                            ${mProgress.solved ? '✅ 挑戰已解鎖' : '⚔️ 開始代碼挑戰'}
                        </button>
                    </div>`;
                }).join("")}
            </div>
        </section>
    `).join("");

    document.getElementById("globalProgress").innerText = Math.round((doneTasks / totalTasks) * 100) + "%";
}

function toggleTask(mId, tIdx) {
    if (!progress[mId]) progress[mId] = { tasks: [], solved: false };
    const idx = progress[mId].tasks.indexOf(tIdx);
    if (idx === -1) progress[mId].tasks.push(tIdx);
    else progress[mId].tasks.splice(idx, 1);
    save();
}

function openChallenge(pId, mId) {
    const m = curriculum.find(p => p.id === pId).missions.find(mi => mi.id === mId);
    activeChallenge = { mId, key: m.challenge.key };
    
    document.getElementById("modalTitle").innerText = m.challenge.title;
    document.getElementById("modalDesc").innerText = m.challenge.desc;
    document.getElementById("modalCode").innerText = m.challenge.code;
    document.getElementById("challengeModal").classList.remove("hidden");
}

function checkChallenge() {
    const input = document.getElementById("modalInput").value.toLowerCase().trim();
    if (input === activeChallenge.key) {
        progress[activeChallenge.mId].solved = true;
        save();
        alert("🎉 完美！你的邏輯通過了考驗。");
        closeModal();
    } else {
        alert("❌ 指令錯誤。再思考一下，或回去看任務提示。");
    }
}

function closeModal() {
    document.getElementById("challengeModal").classList.add("hidden");
    document.getElementById("modalInput").value = "";
}

function save() {
    localStorage.setItem("v10_progress", JSON.stringify(progress));
    render();
}

render();
</script>
</body>
</html>
