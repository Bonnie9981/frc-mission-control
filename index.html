<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FRC Mission Control v3</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#0f172a; color:#e2e8f0;}
.card:hover { transform: translateY(-5px);}
.locked { opacity:0.3; pointer-events:none;}
</style>

</head>

<body>

<!-- Navbar -->
<nav class="bg-slate-900 p-4 flex justify-between">
<div class="text-xl text-blue-400 font-bold">🚀 FRC Mission Control</div>
<div class="space-x-4">
<button onclick="showView('dashboard')">課程</button>
<button onclick="showView('resources')">資源</button>
<button onclick="showView('terms')">術語</button>
<button onclick="showView('mentor')">Mentor</button>
</div>
</nav>

<div class="p-6 max-w-6xl mx-auto">

<!-- Dashboard -->
<div id="dashboard">
<h1 class="text-3xl mb-4">學習路線</h1>
<div id="courses" class="grid md:grid-cols-2 gap-4"></div>
</div>

<!-- Lesson -->
<div id="lesson" class="hidden">
<button onclick="showView('dashboard')" class="mb-4 text-blue-400">← 返回</button>
<div id="lessonContent"></div>
</div>

<!-- Resources -->
<div id="resources" class="hidden">
<h2 class="text-2xl mb-4">資源</h2>
<a href="https://docs.wpilib.org/" target="_blank">WPILib Docs</a>
</div>

<!-- Terms -->
<div id="terms" class="hidden">
<h2 class="text-2xl mb-4">術語表</h2>
<ul>
<li>CAN Bus：機器人內部通訊系統</li>
<li>RoboRIO：機器人大腦</li>
<li>TalonSRX：馬達控制器</li>
</ul>
</div>

<!-- Mentor -->
<div id="mentor" class="hidden">
<h2 class="text-2xl mb-4">Mentor</h2>
<p>有問題請找學長或幹部 👍</p>
</div>

</div>

<script>

// ===== 課程 =====
const lessons = [

{
id:"setup",
title:"環境建置",
desc:"安裝開發環境",
level:"🟢 Rookie",
content:"安裝 VSCode + WPILib",
quiz:{
q:"WPILib 是什麼？",
a:"robot library"
},
tasks:["完成安裝"]
},

{
id:"basic",
title:"Java 基礎",
desc:"學語法",
level:"🔵 基礎",
content:"變數、if、for",
quiz:{
q:"int 是什麼？",
a:"變數型態"
},
tasks:["理解語法"]
},

{
id:"adv",
title:"PID 控制",
desc:"控制系統",
level:"🟣 進階",
content:"error = target - current",
quiz:{
q:"P 代表？",
a:"比例"
},
tasks:["理解PID"]
}

];

// ===== 進度 =====
let progress = JSON.parse(localStorage.getItem("progress")||"{}");

// ===== 顯示 =====
function showView(v){
["dashboard","lesson","resources","terms","mentor"].forEach(id=>{
document.getElementById(id).classList.add("hidden");
});
document.getElementById(v).classList.remove("hidden");
}

// ===== 鎖關 =====
function isLocked(l){
if(l.level==="🟣 進階" && !progress["basic"]) return true;
return false;
}

// ===== 渲染 =====
function renderCourses(){
const el=document.getElementById("courses");

el.innerHTML=lessons.map(l=>{
let done=(progress[l.id]||[]).length;
let percent=Math.round(done/l.tasks.length*100||0);
let locked=isLocked(l);

return `
<div class="card p-4 border border-slate-700 rounded ${locked?'locked':''}"
onclick="${locked?'':`openLesson('${l.id}')`}">

<div class="text-blue-400 text-sm">${l.level}</div>
<h3 class="text-xl font-bold">${l.title}</h3>
<p>${l.desc}</p>

${locked ? '🔒 鎖定' : ''}

<div>${done}/${l.tasks.length}</div>
<div class="bg-slate-700 h-2">
<div class="bg-blue-500 h-2" style="width:${percent}%"></div>
</div>

</div>
`;
}).join("");
}

// ===== 打開課程 =====
function openLesson(id){
const l=lessons.find(x=>x.id===id);
const done=progress[id]||[];

document.getElementById("lessonContent").innerHTML=`

<h2 class="text-2xl mb-2">${l.title}</h2>
<p class="mb-4">${l.content}</p>

<h3>測驗</h3>
<input id="quizAnswer" class="text-black">
<button onclick="checkQuiz('${id}','${l.quiz.a}')">提交</button>

<h3 class="mt-4">任務</h3>

${l.tasks.map(t=>`
<div>
<input type="checkbox"
${done.includes(t)?"checked":""}
disabled>
${t}
</div>
`).join("")}
`;

showView("lesson");
}

// ===== Quiz =====
function checkQuiz(id,ans){
let input=document.getElementById("quizAnswer").value;

if(input===ans){
progress[id]=["done"];
localStorage.setItem("progress",JSON.stringify(progress));
alert("🎉 正確！");
renderCourses();
}else{
alert("❌ 再試一次");
}
}

// 初始化
renderCourses();

</script>

</body>
</html>
