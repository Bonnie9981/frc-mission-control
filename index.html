<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRC Mission Control v12 | 全功能實戰教練版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap');
        :root { --bg: #050505; --card: #121212; --primary: #3b82f6; --success: #10b981; --error: #ef4444; }
        body { background: var(--bg); color: #e5e7eb; font-family: 'Fira Code', monospace; line-height: 1.6; }
        .glass { background: rgba(18, 18, 18, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .motor-anim { width: 60px; height: 60px; border: 4px dashed #666; border-radius: 50%; transition: transform 0.5s linear; }
        .code-input { background: #1a1a1a; color: #10b981; border: 1px solid #333; font-family: 'Fira Code', monospace; font-size: 0.9rem; }
        .task-done { background: #064e3b !important; border-color: #10b981 !important; color: #a7f3d0 !important; }
        .coach-msg { border-left: 4px solid var(--primary); background: rgba(59, 130, 246, 0.1); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="max-w-6xl mx-auto mb-12">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-3xl font-black tracking-tighter text-white">FRC_COACH_v12 <span class="text-blue-500">.exe</span></h1>
            <div id="overallStats" class="text-right">
                <p class="text-xs text-slate-500">工程師養成率</p>
                <div class="flex items-center space-x-2">
                    <span id="globalPercent" class="text-2xl font-black text-blue-500">0%</span>
                </div>
            </div>
        </div>
        <div class="w-full bg-slate-900 h-2 rounded-full overflow-hidden">
            <div id="mainProgressBar" class="bg-blue-600 h-full w-0 transition-all duration-1000"></div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto grid lg:grid-cols-3 gap-8">
        
        <aside class="lg:col-span-1 space-y-4">
            <h2 class="text-sm font-bold text-slate-500 uppercase tracking-widest mb-4">修煉階段</h2>
            <div id="phaseNav" class="space-y-2">
                </div>
        </aside>

        <section class="lg:col-span-2 space-y-6">
            <div id="activeMission" class="glass p-8 rounded-2xl shadow-2xl min-h-[600px]">
                <div class="flex flex-col items-center justify-center h-full text-slate-500">
                    <p>請從左側選擇一個修煉階段開始...</p>
                </div>
            </div>
        </section>
    </main>

    <div id="toast" class="fixed bottom-10 right-10 p-4 rounded-lg bg-blue-600 text-white shadow-2xl hidden transform transition-all translate-y-20"></div>

<script>
// ===== 核心課程資料庫 (教練級設計：做+想+錯) =====
const curriculum = [
    {
        id: "java_var",
        title: "Phase 1: Java 數據命脈",
        desc: "馬達不會聽你的話，除非你先學會怎麼儲存數字。",
        missions: [
            {
                id: "m1_1",
                name: "定義馬達速度",
                coachTip: "馬達速度範圍是 -1.0 到 1.0。整數 (int) 沒辦法表達 0.5，所以我們必須用浮點數 (double)。",
                goal: "請在下方代碼框中宣告一個名為 'speed' 的 double 變數並設為 0.75。",
                initCode: "// 在下方撰寫程式碼\n",
                expected: "double speed = 0.75;",
                tasks: [
                    "理解 int (整數) vs double (小數) 的差異",
                    "撰寫正確的語法 (別漏掉分號 ;)",
                    "觀察模擬器中的轉速變化"
                ],
                showSim: true
            }
        ]
    },
    {
        id: "java_logic",
        title: "Phase 2: 邏輯閘與決策",
        desc: "機器人必須有大腦判斷何時該停下來。",
        missions: [
            {
                id: "m2_1",
                name: "按鈕觸發邏輯",
                coachTip: "當按鈕被按下 (true) 時，馬達才轉動。這需要用到 if 語句。注意括號 { } 的成對關係。",
                goal: "完成這個邏輯：如果 buttonA 是 true，就把 speed 設為 1.0。",
                initCode: "boolean buttonA = true;\ndouble speed = 0.0;\n\n// 這裡開始寫 if 邏輯\n",
                expected: "if(buttonA){speed=1.0;}", // 寬鬆判定會過濾空格
                tasks: [
                    "使用 if (條件) { ... } 結構",
                    "理解 boolean 布林值 (只有 true/false)",
                    "解決『少寫括號』產生的編譯錯誤"
                ],
                showSim: true
            }
        ]
    },
    {
        id: "frc_base",
        title: "Phase 3: WPILib 實戰結構",
        desc: "這是 FRC 機器人程式的真正骨架。",
        missions: [
            {
                id: "m3_1",
                name: "認識 RobotPeriodic",
                coachTip: "RobotPeriodic 每秒會執行 50 次。這是機器人的心跳，所有需要不斷偵測的東西都要放在這裡。",
                goal: "在代碼註解處正確調用一次 System.out.println(\"Heartbeat\");",
                initCode: "public void robotPeriodic() {\n  // 在這裡印出訊息\n}",
                expected: "System.out.println(\"Heartbeat\");",
                tasks: [
                    "理解 20ms (50Hz) 的執行頻率",
                    "學會使用 println 進行基本的 Debug 印字",
                    "區分 Init (初始化) 與 Periodic (週期執行)"
                ],
                showSim: false
            }
        ]
    }
];

let userProgress = JSON.parse(localStorage.getItem("frc_v12_progress") || "{}");
let activeMissionId = null;

// ===== 系統函數 =====

function init() {
    renderNav();
    updateProgress();
}

function renderNav() {
    const nav = document.getElementById("phaseNav");
    nav.innerHTML = curriculum.map(phase => `
        <div class="mb-6">
            <h3 class="text-xs font-bold text-slate-400 mb-2 px-2 tracking-tighter">${phase.title}</h3>
            <div class="space-y-1">
                ${phase.missions.map(m => `
                    <button onclick="loadMission('${m.id}')" 
                        id="nav-btn-${m.id}"
                        class="w-full text-left p-3 rounded-lg text-sm transition flex justify-between items-center ${activeMissionId === m.id ? 'bg-blue-600 text-white' : 'hover:bg-slate-800 text-slate-400'}">
                        <span>${m.name}</span>
                        ${userProgress[m.id]?.done ? '<span class="text-green-400">●</span>' : '<span class="text-slate-600">○</span>'}
                    </button>
                `).join("")}
            </div>
        </div>
    `).join("");
}

function loadMission(id) {
    activeMissionId = id;
    let mission = null;
    curriculum.forEach(p => p.missions.forEach(m => { if(m.id === id) mission = m; }));
    
    const container = document.getElementById("activeMission");
    const p = userProgress[id] || { done: false, code: mission.initCode };

    container.innerHTML = `
        <div class="animate-in fade-in slide-in-from-right-4 duration-500">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h2 class="text-2xl font-black text-white mb-2">${mission.name}</h2>
                    <p class="text-blue-400 text-sm font-bold uppercase tracking-widest">目標：${mission.goal}</p>
                </div>
                ${mission.showSim ? `
                    <div class="text-center">
                        <div id="motorSim" class="motor-anim mb-2"></div>
                        <p class="text-[10px] text-slate-500">模擬馬達狀態</p>
                    </div>
                ` : ''}
            </div>

            <div class="coach-msg p-4 rounded-r-lg mb-6">
                <p class="text-xs italic text-slate-300"><span class="font-bold text-blue-400">教練提示：</span>"${mission.coachTip}"</p>
            </div>

            <div class="grid lg:grid-cols-2 gap-6">
                <div>
                    <h3 class="text-xs font-bold text-slate-500 mb-2 uppercase">代碼編輯器 (Java)</h3>
                    <textarea id="editor" class="w-full h-64 p-4 rounded-lg code-input outline-none focus:ring-2 focus:ring-blue-500 transition">${p.code}</textarea>
                    <button onclick="runCode('${mission.id}')" class="mt-4 w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition shadow-lg shadow-blue-900/40">編譯並運行程式</button>
                </div>

                <div>
                    <h3 class="text-xs font-bold text-slate-500 mb-2 uppercase">實作檢核表</h3>
                    <div class="space-y-3">
                        ${mission.tasks.map((t, idx) => `
                            <div class="p-3 bg-slate-900 border border-slate-800 rounded-lg text-xs flex items-center space-x-3">
                                <div class="w-4 h-4 border border-slate-600 rounded flex items-center justify-center text-[8px]">
                                    ${p.done ? '✔' : ''}
                                </div>
                                <span>${t}</span>
                            </div>
                        `).join("")}
                    </div>

                    <div id="console" class="mt-6 bg-black p-4 rounded-lg border border-slate-800 h-32 overflow-y-auto text-[10px] font-mono">
                        <p class="text-slate-600">> 系統就緒，等待編譯...</p>
                    </div>
                </div>
            </div>
        </div>
    `;
    
    renderNav();
    if(mission.showSim && p.done) updateMotorSim(1.0);
}

function runCode(id) {
    const input = document.getElementById("editor").value;
    const con = document.getElementById("console");
    let mission = null;
    curriculum.forEach(p => p.missions.forEach(m => { if(m.id === id) mission = m; }));

    con.innerHTML += `<p class="text-blue-400">> 正在編譯中...</p>`;

    // 模擬編譯延遲
    setTimeout(() => {
        // 嚴格度判定：去除所有空格與換行進行對比
        const cleanInput = input.replace(/\s/g, "");
        const cleanExpected = mission.expected.replace(/\s/g, "");

        if (cleanInput.includes(cleanExpected)) {
            con.innerHTML += `<p class="text-green-400">> BUILD SUCCESSFUL</p>`;
            con.innerHTML += `<p class="text-slate-300">> 執行結果：變數驗證成功，數值已套用。</p>`;
            
            userProgress[id] = { done: true, code: input };
            save();
            showToast("✅ 完美！這關你學會了。");
            
            if(mission.showSim) updateMotorSim(1.5);
            
            // 延遲更新 UI 讓效果明顯
            setTimeout(() => loadMission(id), 1000);
        } else {
            con.innerHTML += `<p class="text-red-500">> BUILD FAILED: 語法錯誤或邏輯不匹配。</p>`;
            con.innerHTML += `<p class="text-red-300">> 教練碎碎念：再檢查一下分號、大小寫，或是你是不是把變數名稱寫錯了？</p>`;
            showToast("❌ 編譯失敗，檢查主控台訊息。");
            updateMotorSim(0);
        }
    }, 800);
}

function updateMotorSim(speed) {
    const motor = document.getElementById("motorSim");
    if(!motor) return;
    if(speed > 0) {
        motor.style.borderColor = "#10b981";
        motor.style.animation = `spin ${1/speed}s linear infinite`;
    } else {
        motor.style.borderColor = "#666";
        motor.style.animation = "none";
    }
}

// 模擬旋轉動畫 CSS
const style = document.createElement('style');
style.innerHTML = `@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }`;
document.head.appendChild(style);

function updateProgress() {
    let total = 0;
    let done = 0;
    curriculum.forEach(p => p.missions.forEach(m => {
        total++;
        if(userProgress[m.id]?.done) done++;
    }));
    
    const percent = Math.round((done/total)*100);
    document.getElementById("globalPercent").innerText = percent + "%";
    document.getElementById("mainProgressBar").style.width = percent + "%";
}

function save() {
    localStorage.setItem("frc_v12_progress", JSON.stringify(userProgress));
    updateProgress();
}

function showToast(msg) {
    const t = document.getElementById("toast");
    t.innerText = msg;
    t.classList.remove("hidden", "translate-y-20");
    setTimeout(() => {
        t.classList.add("translate-y-20");
        setTimeout(() => t.classList.add("hidden"), 300);
    }, 3000);
}

init();
</script>
</body>
</html>
