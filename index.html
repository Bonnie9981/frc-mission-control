<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>FRC Ultimate Nexus v20 | 全整合教學基地</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Noto+Sans+TC:wght@400;700&family=JetBrains+Mono&display=swap');
        
        :root { --neon-blue: #00f3ff; --neon-green: #39ff14; --neon-red: #ff003c; --bg-dark: #0a0b10; }
        body { background: var(--bg-dark); color: #e2e8f0; font-family: 'Noto Sans TC', sans-serif; height: 100vh; overflow: hidden; }
        .code-font { font-family: 'JetBrains Mono', monospace; }
        
        /* 側邊導航 */
        .nav-item { border-left: 4px solid #1e293b; transition: 0.3s; cursor: pointer; }
        .nav-item.active { border-left-color: var(--neon-blue); background: rgba(0, 243, 255, 0.1); }
        .nav-item.locked { opacity: 0.4; cursor: not-allowed; }
        .nav-item.done::after { content: ' ✓'; color: var(--neon-green); font-weight: bold; }

        /* 模擬器元件 */
        .motor-rotor { width: 140px; height: 140px; border: 8px solid #1e293b; border-radius: 50%; position: relative; transition: transform 0.1s linear; }
        .motor-rotor::before { content: ''; position: absolute; top: 0; left: 50%; width: 4px; height: 50%; background: var(--neon-red); transform: translateX(-50%); }
        
        .joystick-base { width: 80px; height: 80px; background: #1e293b; border-radius: 50%; position: relative; }
        .joystick-handle { width: 30px; height: 30px; background: #475569; border-radius: 50%; position: absolute; top: 25px; left: 25px; cursor: grab; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        /* 代碼編輯器 */
        #editor { background: #000; color: #a5f3fc; border: 1px solid #1e293b; resize: none; outline: none; }
        .smoke { position: absolute; width: 20px; height: 20px; background: rgba(255,255,255,0.2); border-radius: 50%; filter: blur(10px); opacity: 0; pointer-events: none; }
        @keyframes rise { 0% { transform: translateY(0) scale(1); opacity: 0.4; } 100% { transform: translateY(-80px) scale(3); opacity: 0; } }
        .burning { animation: rise 1s infinite; opacity: 1; }
    </style>
</head>
<body class="flex flex-col">

    <div id="auth-overlay" class="fixed inset-0 bg-slate-950/95 z-[1000] flex items-center justify-center p-6 transition-opacity duration-500">
        <div class="bg-slate-900 border border-slate-800 p-10 rounded-3xl max-w-sm w-full shadow-2xl text-center">
            <div class="text-4xl mb-4">🚀</div>
            <h1 class="text-2xl font-black tracking-tighter text-white uppercase">Titan_Nexus_v20</h1>
            <p class="text-xs text-slate-500 mt-2 mb-8">請輸入學員編號以同步進度</p>
            <input id="login-name" type="text" placeholder="你的名字 / STUDENT_ID" class="w-full p-4 bg-slate-950 border border-slate-800 rounded-xl mb-4 text-cyan-400 outline-none focus:border-cyan-500 transition">
            <button onclick="handleLogin()" class="w-full py-4 bg-cyan-600 hover:bg-cyan-500 text-black font-black rounded-xl shadow-[0_0_20px_rgba(0,243,255,0.3)] transition">驗證並啟動</button>
        </div>
    </div>

    <header class="h-16 bg-slate-900 border-b border-slate-800 flex items-center justify-between px-8">
        <div class="flex items-center space-x-4">
            <div class="px-2 py-1 bg-cyan-900 text-cyan-400 text-[10px] font-black rounded border border-cyan-800">SYSTEM_READY</div>
            <h2 class="font-bold text-sm tracking-widest text-slate-300">FRC_DEVELOPER_CONSOLE: <span id="user-display" class="text-white">---</span></h2>
        </div>
        <div class="flex items-center space-x-6">
            <div class="text-right">
                <div class="text-[9px] text-slate-500 font-bold uppercase">總體學習進度</div>
                <div class="w-48 h-1.5 bg-slate-800 rounded-full mt-1 overflow-hidden">
                    <div id="master-progress" class="h-full bg-cyan-500 w-0 transition-all duration-1000"></div>
                </div>
            </div>
            <button onclick="clearData()" class="text-[10px] text-red-500 underline hover:text-red-400">重置檔案</button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <aside class="w-72 bg-slate-900/50 border-r border-slate-800 flex flex-col">
            <div class="p-4 text-[10px] text-slate-500 font-black tracking-widest uppercase border-b border-slate-800">Mission_Tree</div>
            <nav id="mission-nav" class="flex-1 overflow-y-auto p-2 space-y-1">
                </nav>
        </aside>

        <section class="flex-1 flex flex-col bg-slate-950/50 p-6 overflow-y-auto space-y-6">
            <div class="bg-slate-900 border border-slate-800 p-6 rounded-2xl relative overflow-hidden">
                <div class="absolute top-0 right-0 p-4 opacity-10 text-6xl font-black italic" id="bg-num">00</div>
                <h3 id="step-title" class="text-xl font-bold text-white mb-2 underline decoration-cyan-500 decoration-4 underline-offset-8">載入中...</h3>
                <p id="step-desc" class="text-sm text-slate-400 leading-relaxed mt-4"></p>
                <div id="step-tip" class="mt-4 p-4 bg-blue-950/30 border border-blue-900/30 rounded-xl text-xs text-blue-300 italic"></div>
            </div>

            <div class="flex-1 flex flex-col min-h-[400px]">
                <div class="flex justify-between items-end mb-2">
                    <span class="text-[10px] text-slate-500 font-mono italic">Robot.java (Standard FRC Structure)</span>
                    <span id="trans-box" class="text-[11px] text-cyan-500 font-bold"></span>
                </div>
                <textarea id="editor" class="flex-1 p-6 rounded-xl code-font text-sm leading-loose" spellcheck="false" oninput="autoTranslate()"></textarea>
                <div class="mt-4 flex gap-4">
                    <button onclick="deployCode()" class="flex-1 py-4 bg-green-600 hover:bg-green-500 text-white font-black rounded-xl shadow-xl transition transform active:scale-95">
                        編譯並部署到 RoboRIO (F5)
                    </button>
                </div>
            </div>
        </section>

        <aside class="w-80 bg-slate-900/80 border-l border-slate-800 p-6 flex flex-col">
            <div class="text-center py-6">
                <p class="text-[10px] text-slate-500 font-bold mb-8 uppercase tracking-[0.3em]">Hardware_Simulation</p>
                <div class="relative flex justify-center">
                    <div id="smoke-box" class="smoke left-1/2 -translate-x-1/2"></div>
                    <div id="motor-sim" class="motor-rotor"></div>
                </div>
                <p id="speed-text" class="mt-6 text-4xl font-black text-white">0%</p>
                <p class="text-[10px] text-slate-500 mt-1">Output PWM_0</p>
            </div>

            <div class="mt-10 pt-10 border-t border-slate-800">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-[10px] text-slate-500 font-bold uppercase">HID_Joystick_USB0</span>
                    <span id="joy-status" class="text-[9px] px-2 py-0.5 bg-slate-800 rounded text-slate-400">IDLE</span>
                </div>
                <div class="flex justify-center mb-6">
                    <div class="joystick-base">
                        <div id="joy-handle" class="joystick-handle"></div>
                    </div>
                </div>
                <div class="space-y-2">
                    <div class="bg-black/50 p-3 rounded-lg flex justify-between">
                        <span class="text-[10px] text-slate-500 font-bold">Axis Y</span>
                        <span id="axis-y-val" class="text-xs text-cyan-400 font-mono">0.00</span>
                    </div>
                </div>
            </div>

            <div class="mt-auto h-32 bg-black rounded-xl border border-slate-800 p-3 font-mono text-[10px] overflow-y-auto">
                <div id="console-logs" class="text-slate-500 space-y-1">
                    <p>> 系統連線就緒...</p>
                </div>
            </div>
        </aside>
    </main>

<script>
// --- [1. 完整的教學內容數據庫] ---
const nexusMissions = [
    {
        id: 0,
        title: "第一步：軟體安裝與環境",
        desc: "歡迎來到 FRC！作為新手，你首先需要安裝 WPILib 教科書。在程式中，我們透過 <code>import</code> 來引入馬達控制功能。請在最上方加入馬達的『說明書』。",
        tip: "💡 這裡學到：如何呼叫 FRC 官方庫。沒有它，機器人連馬達是什麼都不知道。",
        start: "import edu.wpi.first.wpilibj.TimedRobot;\n// 加入下一行：import edu.wpi.first.wpilibj.motorcontrol.PWMVictorSPX;\n\npublic class Robot extends TimedRobot {\n}",
        solution: "import edu.wpi.first.wpilibj.motorcontrol.PWMVictorSPX;",
        trans: "引入馬達控制模組..."
    },
    {
        id: 1,
        title: "第二步：硬體定義 (Init)",
        desc: "我們要告訴程式，馬達插在 RoboRIO 的哪個孔。請宣告一個名為 <code>m_motor</code> 的馬達，並在 <code>robotInit</code> 中連接到 <b>PWM 埠號 0</b>。",
        tip: "💡 這裡學到：實體化 (Instantiation)。這是在程式世界裡創造出一個真實存在的馬達物件。",
        start: "public class Robot extends TimedRobot {\n  PWMVictorSPX m_motor;\n\n  @Override\n  public void robotInit() {\n    // 寫入：m_motor = new PWMVictorSPX(0);\n  }\n}",
        solution: "m_motor = new PWMVictorSPX(0);",
        trans: "在 PWM 0 號位置初始化馬達..."
    },
    {
        id: 2,
        title: "第三步：遙控連動 (Periodic)",
        desc: "現在是重頭戲！讀取搖桿 Y 軸的值，並直接塞給馬達。請在 <code>robotPeriodic</code> 寫入連動指令。",
        tip: "💡 這裡學到：控制閉環 (Control Loop)。Periodic 每秒執行 50 次，讓馬達不斷跟隨搖桿動作。",
        start: "Joystick m_stick = new Joystick(0);\n\n@Override\npublic void robotPeriodic() {\n  // 寫入：m_motor.set(m_stick.getY());\n}",
        solution: "m_motor.set(m_stick.getY());",
        trans: "抓取搖桿數值並輸出至馬達..."
    },
    {
        id: 3,
        title: "第四步：過載警告 (If-Else)",
        desc: "如果你讓馬達出力超過 1.0 (故意設為 2.0)，馬達會冒煙！請練習手動設定出力為 <b>2.0</b> 來觸發保護裝置。",
        tip: "💡 這裡學到：安全機制。身為工程師，你必須知道硬體的極限。",
        start: "public void robotPeriodic() {\n  // 寫入：m_motor.set(2.0);\n}",
        solution: "m_motor.set(2.0);",
        trans: "危險測試：嘗試輸出極限電流..."
    }
];

// --- [2. 系統狀態管理] ---
let state = {
    user: "",
    progress: 0,
    motorAngle: 0,
    motorSpeed: 0,
    isJoystickActive: false
};

// --- [3. 登入與進度管理] ---
function handleLogin() {
    const name = document.getElementById('login-name').value;
    if(!name) return alert("請輸入學員姓名！");
    state.user = name;
    
    // 從 LocalStorage 恢復進度
    const saved = localStorage.getItem(`nexus_save_${name}`);
    if(saved) {
        state.progress = JSON.parse(saved).progress;
    }
    
    document.getElementById('auth-overlay').style.opacity = '0';
    setTimeout(() => {
        document.getElementById('auth-overlay').classList.add('hidden');
        initNexus();
    }, 500);
}

function initNexus() {
    document.getElementById('user-display').innerText = state.user;
    renderNav();
    loadMission(state.progress);
    startPhysicsEngine();
    enableJoystick();
}

function renderNav() {
    const nav = document.getElementById('mission-nav');
    nav.innerHTML = nexusMissions.map((m, i) => `
        <div onclick="loadMission(${i})" class="nav-item p-4 mb-1 rounded-r-lg text-sm ${i === state.progress ? 'active' : ''} ${i < state.progress ? 'done' : ''} ${i > state.progress ? 'locked' : ''}">
            <span class="text-[9px] block opacity-50 font-mono">MISSION_0${i}</span>
            <p class="font-bold">${m.title}</p>
        </div>
    `).join("");
    document.getElementById('master-progress').style.width = (state.progress / (nexusMissions.length - 1) * 100) + "%";
}

function loadMission(idx) {
    if(idx > state.progress) return;
    const m = nexusMissions[idx];
    document.getElementById('step-title').innerText = m.title;
    document.getElementById('step-desc').innerHTML = m.desc;
    document.getElementById('step-tip').innerHTML = m.tip;
    document.getElementById('editor').value = m.start;
    document.getElementById('bg-num').innerText = "0" + idx;
    autoTranslate();
}

// --- [4. 核心功能：翻譯機與部署] ---
function autoTranslate() {
    const code = document.getElementById('editor').value;
    const transBox = document.getElementById('trans-box');
    const m = nexusMissions[state.progress];
    
    if(code.includes(m.solution.split(';')[0])) {
        transBox.innerText = "✓ 翻譯：將代碼轉換為機器指令 - " + m.trans;
    } else {
        transBox.innerText = "等待輸入正確的 Java 指令...";
    }
}

function deployCode() {
    const code = document.getElementById('editor').value;
    const m = nexusMissions[state.progress];
    
    addLog("> 啟動 Gradle Build...", "slate-500");
    
    setTimeout(() => {
        if(code.includes(m.solution)) {
            addLog("> DEPLOY SUCCESSFUL! 程式已寫入 RoboRIO。", "green-400");
            
            // 特殊邏輯：解鎖搖桿或觸發燒毀
            if(state.progress === 2) state.isJoystickActive = true;
            if(state.progress === 3 && code.includes("2.0")) triggerBurn();

            // 進度儲存
            if(state.progress < nexusMissions.length - 1) {
                state.progress++;
                localStorage.setItem(`nexus_save_${state.user}`, JSON.stringify({progress: state.progress}));
                setTimeout(() => { alert("任務達成！解鎖下一階段內容。"); renderNav(); loadMission(state.progress); }, 1000);
            }
        } else {
            addLog("> BUILD FAILED: 語法錯誤或邏輯不匹配。", "red-400");
        }
    }, 1000);
}

// --- [5. 物理引擎與模擬器] ---
function startPhysicsEngine() {
    setInterval(() => {
        if(Math.abs(state.motorSpeed) > 0.05) {
            state.motorAngle += (state.motorSpeed * 30);
            document.getElementById('motor-sim').style.transform = `rotate(${state.motorAngle}deg)`;
        }
        document.getElementById('speed-text').innerText = Math.round(state.motorSpeed * 100) + "%";
    }, 20);
}

function enableJoystick() {
    const handle = document.getElementById('joy-handle');
    handle.onmousedown = (e) => {
        document.onmousemove = (ev) => {
            let y = (ev.clientY - handle.parentElement.getBoundingClientRect().top - 40) / 40;
            y = Math.max(-1, Math.min(1, y));
            handle.style.top = (25 + y * 25) + "px";
            document.getElementById('axis-y-val').innerText = (-y).toFixed(2);
            document.getElementById('joy-status').innerText = "ACTIVE";
            if(state.isJoystickActive) state.motorSpeed = -y;
        };
        document.onmouseup = () => {
            document.onmousemove = null;
            handle.style.top = "25px";
            state.motorSpeed = 0;
            document.getElementById('axis-y-val').innerText = "0.00";
            document.getElementById('joy-status').innerText = "IDLE";
        };
    };
}

function triggerBurn() {
    document.getElementById('smoke-box').classList.add('burning');
    addLog("> CRITICAL: 馬達電流過載！燒毀警告！", "red-500");
    state.motorSpeed = 0;
}

function addLog(msg, color) {
    const log = document.getElementById('console-logs');
    log.innerHTML += `<p class="text-${color}">> ${msg}</p>`;
    log.scrollTop = log.scrollHeight;
}

function clearData() {
    if(confirm("確定要重置所有進度嗎？")) { localStorage.clear(); location.reload(); }
}
</script>
</body>
</html>
