<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRC Black Box v15 | 實戰硬核修煉場</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --neon-blue: #00f3ff;
            --neon-red: #ff003c;
            --neon-green: #39ff14;
            --bg-dark: #020205;
        }

        body {
            background-color: var(--bg-dark);
            color: #d1d5db;
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
            height: 100vh;
        }

        .crt-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none; z-index: 100;
        }

        .panel-glow {
            border: 1px solid #1a1a2e;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.05);
        }

        /* 馬達與煙霧動畫 */
        .motor-box {
            position: relative; width: 220px; height: 220px;
        }

        .motor-rotor {
            width: 100%; height: 100%;
            border: 8px solid #111;
            border-top-color: var(--neon-blue);
            border-radius: 50%;
            transition: border-color 0.3s;
        }

        .smoke {
            position: absolute; top: 50%; left: 50%;
            width: 10px; height: 10px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            filter: blur(10px);
            opacity: 0;
            pointer-events: none;
        }

        @keyframes smoke-up {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            100% { transform: translate(-50%, -200%) scale(4); opacity: 0; }
        }

        .burning { animation: smoke-up 1s infinite; opacity: 1; }

        /* 代碼編輯器 */
        .editor-input {
            width: 100%; height: 300px;
            background: #05050a;
            color: var(--neon-green);
            border: 1px solid #1a1a2e;
            padding: 15px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            outline: none;
            resize: none;
        }

        .error-line { background: rgba(255, 0, 60, 0.2); }

        /* 按鈕風格 */
        .btn-deploy {
            background: #000;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 10px 25px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            cursor: pointer;
        }

        .btn-deploy:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 30px var(--neon-blue);
        }

        .btn-deploy:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body class="flex flex-col">
    <div class="crt-overlay"></div>

    <header class="h-16 flex items-center justify-between px-8 border-b border-gray-900 bg-black">
        <div class="flex items-center space-x-4">
            <h1 class="text-xl font-black italic text-cyan-400 tracking-tighter">PROJECT_TITAN_V15</h1>
            <span id="status-tag" class="text-[10px] px-2 py-0.5 bg-green-900/30 text-green-500 border border-green-500 rounded">SYSTEM_READY</span>
        </div>
        <div class="flex space-x-12">
            <div class="text-right">
                <p class="text-[10px] text-gray-600">HEAT_LEVEL</p>
                <p id="heat-val" class="text-xs font-bold text-blue-400">NORMAL</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-gray-600">MISSION_SYNC</p>
                <p id="sync-val" class="text-xs font-bold text-white">0%</p>
            </div>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        
        <div class="w-1/2 p-8 overflow-y-auto border-r border-gray-900 space-y-6">
            <div class="space-y-2">
                <h2 id="lesson-name" class="text-2xl font-bold text-white">正在加載核心指令...</h2>
                <p id="lesson-desc" class="text-sm text-gray-400 leading-relaxed"></p>
            </div>

            <div id="task-box" class="p-4 bg-gray-900/30 border border-gray-800 rounded">
                <h3 class="text-[10px] font-bold text-cyan-700 mb-2 uppercase tracking-widest">Mission_Objectives</h3>
                <ul id="task-list" class="text-xs space-y-2"></ul>
            </div>

            <div class="relative">
                <div class="absolute -top-3 left-4 px-2 bg-gray-900 text-[10px] text-gray-500">TITAN_IDE_v15</div>
                <textarea id="editor" class="editor-input" oninput="autoSync()"></textarea>
                <div class="mt-4 flex justify-between">
                    <button id="reset-btn" onclick="resetEditor()" class="text-[10px] text-gray-600 underline">重置原始代碼</button>
                    <button id="deploy-btn" onclick="deployCode()" class="btn-deploy">DEPLOY_TO_RIO</button>
                </div>
            </div>
        </div>

        <div class="w-1/2 bg-black/40 flex flex-col">
            <div class="flex-1 flex flex-col items-center justify-center space-y-8 p-10">
                <div class="motor-box">
                    <div id="motor-visual" class="motor-rotor"></div>
                    <div id="smoke-1" class="smoke"></div>
                    <div id="smoke-2" class="smoke" style="animation-delay: 0.5s"></div>
                    <div class="absolute inset-0 flex items-center justify-center">
                        <div class="text-center">
                            <span id="speed-pct" class="text-4xl font-black text-white">0%</span><br>
                            <span class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">OUTPUT</span>
                        </div>
                    </div>
                </div>

                <div class="w-full max-w-sm space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="p-3 bg-gray-900/50 border border-gray-800 rounded">
                            <p class="text-[10px] text-gray-500">AMPS_DRAWN</p>
                            <p id="amp-val" class="text-lg font-bold text-cyan-400">0.0A</p>
                        </div>
                        <div class="p-3 bg-gray-900/50 border border-gray-800 rounded">
                            <p class="text-[10px] text-gray-600 text-gray-500">VOLTAGE</p>
                            <p class="text-lg font-bold text-yellow-500">12.6V</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="h-64 border-t border-gray-900 bg-black/80 p-6 font-mono overflow-y-auto">
                <div class="flex justify-between items-center mb-4 border-b border-gray-800 pb-2">
                    <span class="text-[10px] font-bold text-gray-600 tracking-widest">RIO_LOG_CONSOLE</span>
                    <span id="log-status" class="text-[8px] text-green-500">CONNECTED</span>
                </div>
                <div id="console-logs" class="text-[11px] space-y-1">
                    <p class="text-gray-600">> 系統初始化中...</p>
                    <p class="text-gray-600">> 等待代碼佈署...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- 核心課程數據 ---
        const curriculum = [
            {
                id: "setup",
                name: "01_環境配置與宣告",
                desc: "在 FRC 中，我們必須先定義馬達。請嘗試在 `robotInit` 中宣告一個名為 `m_motor` 的馬達變數，並將其連接到埠號 0。",
                tasks: [
                    "宣告 PWMVictorSPX m_motor",
                    "在 robotInit 進行實體化",
                    "編譯並觀察 RIO 狀態"
                ],
                startCode: "import edu.wpi.first.wpilibj.*;\n\npublic class Robot extends TimedRobot {\n  // 1. 在此處定義馬達\n  \n  @Override\n  public void robotInit() {\n    // 2. 在此處實體化馬達\n  }\n}",
                solution: ["PWMVictorSPX", "m_motor", "newPWMVictorSPX(0)"],
                onRun: (code) => {
                    if(code.includes("PWMVictorSPX m_motor") && code.includes("new PWMVictorSPX(0)")) return { success: true, msg: "馬達初始化成功！硬體鏈路已建立。" };
                    return { success: false, msg: "編譯失敗：未定義的馬達實體。請檢查語法與變數名稱。" };
                }
            },
            {
                id: "overload",
                name: "02_控制與極限測試",
                desc: "現在，我們要讓馬達轉動。但注意！如果給予超過 1.0 的速度，或者死循環，馬達會燒毀。請將速度設為 0.8 並執行。",
                tasks: [
                    "在 robotPeriodic 中設定速度",
                    "理解 50Hz 刷新頻率",
                    "避免讓輸出超過 1.0"
                ],
                startCode: "public void robotPeriodic() {\n  double speed = 0.0;\n  // 寫入馬達設定代碼\n  \n}",
                solution: ["m_motor.set"],
                onRun: (code) => {
                    // 檢查是否寫入 speed = 2.0 (過載測試)
                    if(code.includes("speed = 2.0") || code.includes("speed > 1.0")) return { success: false, burn: true, msg: "致命錯誤：VOLTAGE OVERLOAD! 馬達燒毀！" };
                    if(code.includes("m_motor.set")) return { success: true, speed: 0.8, msg: "執行成功：馬達運作中。目前出力 80%。" };
                    return { success: false, msg: "邏輯錯誤：馬達未收到指令。" };
                }
            }
        ];

        let activeStep = 0;
        let motorInterval = null;
        let angle = 0;

        function init() {
            loadLesson(0);
        }

        function loadLesson(idx) {
            activeStep = idx;
            const data = curriculum[idx];
            document.getElementById('lesson-name').innerText = data.name;
            document.getElementById('lesson-desc').innerHTML = data.desc;
            document.getElementById('editor').value = data.startCode;
            document.getElementById('sync-val').innerText = Math.round((idx / curriculum.length) * 100) + "%";

            const tList = document.getElementById('task-list');
            tList.innerHTML = data.tasks.map(t => `<li class="flex items-center space-x-2"><span class="w-2 h-2 bg-gray-700 rounded-full"></span><span>${t}</span></li>`).join("");
            
            log(`載入任務: ${data.id}...`, 'cyan');
        }

        function deployCode() {
            const code = document.getElementById('editor').value;
            const data = curriculum[activeStep];
            const result = data.onRun(code);

            log(`> 正在進行 Build 編譯...`, 'gray');
            
            setTimeout(() => {
                if (result.success) {
                    log(`> ${result.msg}`, 'green');
                    document.getElementById('status-tag').innerText = "RUNNING";
                    document.getElementById('status-tag').className = "text-[10px] px-2 py-0.5 bg-green-900/30 text-green-500 border border-green-500 rounded";
                    
                    if(result.speed) startMotor(result.speed);
                    
                    // 解鎖下一關
                    if(activeStep < curriculum.length - 1) {
                        setTimeout(() => { if(confirm("這關你過關了，要挑戰更高難度的硬體控制嗎？")) loadLesson(activeStep + 1); }, 2000);
                    }
                } else {
                    log(`> ${result.msg}`, 'red');
                    if (result.burn) {
                        triggerBurn();
                    }
                }
            }, 1000);
        }

        function startMotor(speed) {
            if(motorInterval) clearInterval(motorInterval);
            document.getElementById('speed-pct').innerText = Math.round(speed * 100) + "%";
            document.getElementById('amp-val').innerText = (speed * 40).toFixed(1) + "A";
            
            motorInterval = setInterval(() => {
                angle += (speed * 30);
                document.getElementById('motor-visual').style.transform = `rotate(${angle}deg)`;
            }, 20);
        }

        function triggerBurn() {
            document.getElementById('smoke-1').classList.add('burning');
            document.getElementById('smoke-2').classList.add('burning');
            document.getElementById('heat-val').innerText = "CRITICAL";
            document.getElementById('heat-val').className = "text-xs font-bold text-red-500";
            document.getElementById('status-tag').innerText = "SYSTEM_FAILURE";
            document.getElementById('status-tag').className = "text-[10px] px-2 py-0.5 bg-red-900/30 text-red-500 border border-red-500 rounded";
            startMotor(0);
            log("!!! HARDWARE DAMAGE DETECTED !!!", "red");
        }

        function log(msg, color) {
            const colors = {
                red: 'text-red-500',
                green: 'text-green-500',
                cyan: 'text-cyan-400',
                gray: 'text-gray-600'
            };
            const consoleBox = document.getElementById('console-logs');
            consoleBox.innerHTML += `<p class="${colors[color] || 'text-white'}">${msg}</p>`;
            consoleBox.scrollTop = consoleBox.scrollHeight;
        }

        function resetEditor() {
            if(confirm("確定要放棄目前代碼並重置嗎？")) loadLesson(activeStep);
        }

        init();
    </script>
</body>
</html>
