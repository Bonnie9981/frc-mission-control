<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRC Mission Control v8 | 新手孵化器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: #e2e8f0; font-family: sans-serif; }
        .step-card { background: #1e293b; border: 1px solid #334155; transition: 0.3s; }
        .step-card:hover { border-color: #3b82f6; }
        .progress-fill { transition: width 0.5s ease-in-out; }
        .completed-text { text-decoration: line-through; color: #64748b; }
        .locked { opacity: 0.3; pointer-events: none; filter: grayscale(1); }
    </style>
</head>
<body class="pb-20">

<nav class="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-50">
    <div class="max-w-5xl mx-auto flex justify-between items-center">
        <div>
            <span class="text-blue-400 font-bold text-xl">🚀 FRC 新手村</span>
            <span id="navHint" class="hidden md:inline text-xs text-slate-500 ml-4">準備開始你的機器人專案...</span>
        </div>
        <div id="userTag" class="text-sm font-mono text-slate-400"></div>
    </div>
</nav>

<div class="p-6 max-w-5xl mx-auto">

    <div id="login" class="flex flex-col items-center py-20">
        <h1 class="text-4xl font-bold mb-4">歡迎加入 FRC 團隊</h1>
        <p class="text-slate-400 mb-8 text-center">這個系統將帶領你從零開始，直到寫出第一個機器人程式。</p>
        <div class="bg-slate-800 p-6 rounded-xl w-full max-w-sm shadow-xl">
            <input id="username" class="w-full bg-slate-900 border border-slate-700 p-3 rounded mb-4 text-white" placeholder="請輸入你的名字...">
            <button onclick="boot()" class="w-full bg-blue-600 hover:bg-blue-500 font-bold py-3 rounded text-lg transition">開始學習之旅</button>
        </div>
    </div>

    <div id="app" class="hidden space-y-8">
        
        <div class="bg-slate-800/50 p-4 rounded-lg border border-slate-700 flex items-center justify-between">
            <div>
                <h2 class="text-lg font-bold">你的修煉進度</h2>
                <p class="text-xs text-slate-400">完成所有任務即可獲得「Rookie 認證」</p>
            </div>
            <div class="text-right">
                <span id="totalPercent" class="text-2xl font-black text-blue-400">0%</span>
            </div>
        </div>

        <div id="courseMap" class="grid gap-6">
            </div>

    </div>

    <div id="lessonDetail" class="hidden animate-in fade-in duration-300">
        <button onclick="showMain()" class="mb-6 text-blue-400 flex items-center">← 返回清單</button>
        <div id="detailContent"></div>
    </div>

</div>

<script>
// ===== 任務極細化資料庫 (v8 修訂版) =====
const content = [
    {
        id: "m0",
        title: "Mission 0: 裝備點收 (環境建置)",
        difficulty: "🟢 Rookie",
        hint: "你要先有工具，才能蓋出大樓。這關我們要把軟體裝好。",
        quizType: "choice",
        quizQ: "在 FRC 程式開發中，我們主要使用哪一個編輯器？",
        options: ["Notepad++", "VS Code (WPILib 版)", "Word"],
        answer: 1, 
        tasks: [
            "下載並安裝 Java JDK 17",
            "下載 WPILib Installer (官方提供)",
            "執行安裝程式 (選擇 Everything)",
            "桌面出現一個紅色的 202X WPILib VS Code",
            "開啟該軟體，確認右上方有個小紅 W 圖標",
            "點擊紅 W，選擇 'Create a new project'",
            "專案模板選擇 'Timed Robot' (Java)",
            "按下 Build Project，確認底部顯示 'BUILD SUCCESSFUL'"
        ]
    },
    {
        id: "m1",
        title: "Mission 1: 機器人的邏輯 (Java 基礎)",
        difficulty: "🔵 Basic",
        hint: "學習如何跟機器人溝通。我們要練習基本的語法。",
        quizType: "input",
        quizQ: "在 Java 中，如果要儲存一個馬達的埠號（整數），變數型態要用什麼？",
        quizKey: "int",
        tasks: [
            "在 Robot.java 裡找到 robotInit()",
            "練習宣告一個整數變數：int motorID = 1;",
            "練習寫一個 if 判斷式",
            "理解什麼是 double (用於馬達速度 -1.0 ~ 1.0)",
            "在代碼中加入註解 // 這是一行註解",
            "成功完成一次代碼編譯 (Build)"
        ]
    },
    {
        id: "m2",
        title: "Mission 2: PID 穩定控制",
        difficulty: "🟣 Advanced",
        hint: "讓機器人動得精準。這需要閱讀文檔來理解原理。",
        quizType: "doc",
        quizQ: "請點開官方文檔，找到關於 'P' (Proportional) 的描述並貼上一小段原文：",
        docUrl: "https://docs.wpilib.org/en/stable/docs/software/advanced-controls/introduction/introduction-to-pid.html",
        quizKey: "proportional",
        tasks: [
            "在專案中新增一個 PIDController 物件",
            "將 Encoder (編碼器) 的數值傳給 PID",
            "在 SmartDashboard 上顯示當前數值",
            "調整 kP 值，讓馬達精準轉動 90 度",
            "錄影並向 Mentor 展示你的機器人不會震盪"
        ]
    }
];

let user = localStorage.getItem("v8_user");
let progress = JSON.parse(localStorage.getItem("v8_progress") || "{}");

function boot() {
    user = document.getElementById("username").value;
    if(!user) return alert("請輸入名字，讓我們認識你！");
    localStorage.setItem("v8_user", user);
    init();
}

function init() {
    document.getElementById("login").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    document.getElementById("userTag").innerText = `你好，${user}！`;
    renderMain();
}

if(user) init();

function renderMain() {
    const map = document.getElementById("courseMap");
    let totalTasks = 0;
    let completedTasks = 0;

    map.innerHTML = content.map((m, idx) => {
        const p = progress[m.id] || { quiz: false, tasks: [] };
        const isLocked = idx > 0 && !progress[content[idx-1].id]?.quiz;
        totalTasks += m.tasks.length;
        completedTasks += p.tasks.length;

        return `
        <div class="step-card p-6 rounded-xl cursor-pointer ${isLocked ? 'locked' : ''}" onclick="openDetail('${m.id}')">
            <div class="flex justify-between items-start mb-2">
                <span class="text-xs font-bold text-blue-400 uppercase tracking-widest">${m.difficulty}</span>
                <span class="text-xs text-slate-500">${p.tasks.length}/${m.tasks.length} 已完成</span>
            </div>
            <h3 class="text-xl font-bold mb-2">${m.title}</h3>
            <p class="text-sm text-slate-400 mb-4">${m.hint}</p>
            <div class="w-full bg-slate-900 h-1.5 rounded-full overflow-hidden">
                <div class="bg-blue-500 h-full progress-fill" style="width: ${(p.tasks.length/m.tasks.length)*100}%"></div>
            </div>
            ${isLocked ? '<p class="text-xs text-red-500 mt-2 font-bold italic">🔒 請先完成前一項 Mission 的 Quiz</p>' : ''}
        </div>`;
    }).join("");

    document.getElementById("totalPercent").innerText = Math.round((completedTasks/totalTasks)*100) + "%";
}

function openDetail(id) {
    const m = content.find(x => x.id === id);
    const p = progress[id] || { quiz: false, tasks: [] };
    
    document.getElementById("app").classList.add("hidden");
    document.getElementById("lessonDetail").classList.remove("hidden");
    
    let quizHtml = "";
    if (m.quizType === "choice") {
        quizHtml = m.options.map((opt, i) => `
            <button onclick="checkQuiz('${id}', ${i})" class="w-full text-left bg-slate-900 p-3 rounded border border-slate-700 hover:border-blue-500 mb-2 transition">
                ${String.fromCharCode(65+i)}. ${opt}
            </button>
        `).join("");
    } else {
        quizHtml = `
            <p class="text-xs text-slate-500 mb-2">${m.quizType === 'doc' ? '請參考連結：<a href="'+m.docUrl+'" target="_blank" class="text-blue-400 underline">官方文檔</a>' : '提示：這是一個專業術語'}</p>
            <textarea id="quizInput" class="w-full bg-slate-900 border border-slate-700 p-3 rounded mb-2 h-24 text-white" placeholder="在此輸入內容..."></textarea>
            <button onclick="checkQuiz('${id}')" class="w-full bg-blue-600 py-2 rounded font-bold">提交驗證</button>
        `;
    }

    document.getElementById("detailContent").innerHTML = `
        <div class="space-y-8">
            <div class="bg-blue-900/20 border border-blue-500/50 p-6 rounded-xl">
                <h2 class="text-2xl font-bold mb-2">${m.title}</h2>
                <p class="text-slate-300">👉 目前目標：${m.hint}</p>
            </div>

            <div class="grid md:grid-cols-2 gap-8">
                <div class="bg-slate-800 p-6 rounded-xl">
                    <h3 class="font-bold text-yellow-500 mb-4 tracking-tighter uppercase">第一步：解鎖任務 (Quiz)</h3>
                    <p class="text-sm mb-4">${m.quizQ}</p>
                    <div id="quizArea">${p.quiz ? '<p class="text-green-400 font-bold">✅ 已通過認證，任務已解鎖！</p>' : quizHtml}</div>
                </div>

                <div class="bg-slate-800 p-6 rounded-xl ${!p.quiz ? 'opacity-20 pointer-events-none' : ''}">
                    <h3 class="font-bold text-blue-400 mb-4 tracking-tighter uppercase">第二步：動手實作</h3>
                    <div class="space-y-3">
                        ${m.tasks.map(t => `
                            <label class="flex items-center space-x-3 p-2 hover:bg-slate-900 rounded cursor-pointer transition">
                                <input type="checkbox" class="w-5 h-5 rounded accent-blue-500" 
                                    ${p.tasks.includes(t) ? 'checked' : ''} 
                                    onchange="toggleTask('${id}', '${t}')">
                                <span class="${p.tasks.includes(t) ? 'completed-text' : ''} text-sm">${t}</span>
                            </label>
                        `).join("")}
                    </div>
                </div>
            </div>
        </div>
    `;
}

function checkQuiz(id, choiceIdx = null) {
    const m = content.find(x => x.id === id);
    if (!progress[id]) progress[id] = { quiz: false, tasks: [] };

    if (m.quizType === "choice") {
        if (choiceIdx === m.answer) {
            progress[id].quiz = true;
            alert("✅ 選對了！你是天才！");
        } else {
            return alert("❌ 哎呀，再想一下？");
        }
    } else {
        const input = document.getElementById("quizInput").value.toLowerCase().trim();
        if (input.includes(m.quizKey)) {
            progress[id].quiz = true;
            alert("✅ 關鍵字正確，解鎖成功！");
        } else {
            return alert("❌ 關鍵字沒對上喔，再檢查一下文檔！");
        }
    }
    save();
    openDetail(id);
}

function toggleTask(id, t) {
    if (!progress[id].tasks.includes(t)) {
        progress[id].tasks.push(t);
    } else {
        progress[id].tasks = progress[id].tasks.filter(item => item !== t);
    }
    save();
    renderMain();
}

function showMain() {
    document.getElementById("lessonDetail").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    renderMain();
}

function save() {
    localStorage.setItem("v8_progress", JSON.stringify(progress));
}

function renderRank() {
    // 這裡可以擴展排行榜邏輯
}
</script>

</body>
</html>
