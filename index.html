<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>FRC 初學者啟蒙基地 v18</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;900&family=JetBrains+Mono&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background: #f0f2f5; color: #1a1a1a; }
        .code-font { font-family: 'JetBrains Mono', monospace; }
        .step-active { background: white; border-left: 8px solid #3b82f6; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .motor-wheel { width: 120px; height: 120px; border: 10px solid #333; border-radius: 50%; position: relative; transition: transform 0.1s linear; }
        .motor-wheel::after { content: ''; position: absolute; top: 0; left: 50%; width: 4px; height: 50%; background: red; transform: translateX(-50%); }
        .hint-box { background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af; }
        #login-screen { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); z-index: 1000; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <div id="login-screen" class="fixed inset-0 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-10 shadow-2xl max-w-sm w-full text-center">
            <div class="mb-6">
                <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <span class="text-3xl">🤖</span>
                </div>
                <h1 class="text-2xl font-black">FRC 新手教室</h1>
                <p class="text-gray-400 text-sm mt-1">第一次碰機器人？別擔心，跟我來！</p>
            </div>
            <input id="u-id" type="text" placeholder="你的名字 (學員代號)" class="w-full p-4 border rounded-xl mb-4 outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="startJourney()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition">開始學習</button>
            <p class="mt-6 text-[10px] text-gray-400 uppercase tracking-widest">Team Access Code: FRC2026</p>
        </div>
    </div>

    <header class="bg-white border-b p-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center space-x-3">
            <span class="bg-blue-600 text-white p-2 rounded-lg font-black italic">FRC</span>
            <h2 class="font-bold text-lg">工程師修煉手冊 <span id="user-tag" class="text-blue-500 font-normal"></span></h2>
        </div>
        <div class="flex items-center space-x-4">
            <div class="text-right">
                <p class="text-[10px] text-gray-400 uppercase font-bold">目前進度</p>
                <div class="w-32 h-2 bg-gray-200 rounded-full mt-1 overflow-hidden">
                    <div id="p-bar" class="h-full bg-green-500 w-0 transition-all duration-1000"></div>
                </div>
            </div>
            <button onclick="logout()" class="text-xs text-gray-400 hover:text-red-500">登出</button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <aside class="w-72 bg-gray-50 border-r p-4 space-y-2 overflow-y-auto">
            <p class="text-[10px] font-bold text-gray-400 mb-4 px-2 uppercase tracking-widest">學習路線圖</p>
            <div id="nav-list"></div>
        </aside>

        <section class="flex-1 p-8 overflow-y-auto space-y-8 bg-white">
            <div id="lesson-content">
                </div>

            <div class="bg-slate-900 rounded-2xl p-6 shadow-xl relative">
                <div class="absolute -top-3 left-6 bg-blue-500 text-white text-[10px] px-3 py-1 rounded-full font-bold">機器人聽得懂的語言 (Java)</div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-4">
                    <div class="space-y-4">
                        <p class="text-xs text-slate-400 underline italic">你只要在這裡輸入關鍵字：</p>
                        <textarea id="code-box" class="w-full h-40 bg-black text-green-400 p-4 rounded-xl code-font text-sm outline-none border border-slate-700 focus:border-blue-500" placeholder="請依照上方指示填寫..."></textarea>
                    </div>
                    <div class="bg-slate-800/50 rounded-xl p-4 border border-slate-700">
                        <p class="text-xs text-slate-400 mb-2 font-bold">白話文翻譯機：</p>
                        <div id="translation" class="text-sm text-blue-200 italic space-y-2">
                            等待輸入中...
                        </div>
                    </div>
                </div>
                <button onclick="checkAnswer()" class="mt-6 w-full bg-green-500 hover:bg-green-600 text-white font-black py-4 rounded-xl transition">
                    執行！讓機器人動起來
                </button>
            </div>
        </section>

        <aside class="w-80 bg-gray-900 flex flex-col p-6 text-white border-l border-slate-800">
            <div class="text-center space-y-8">
                <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest italic">實體模擬視窗</h3>
                <div class="flex justify-center">
                    <div id="m-wheel" class="motor-wheel"></div>
                </div>
                <div class="space-y-4 text-left">
                    <div class="bg-black/50 p-4 rounded-xl border border-slate-800">
                        <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">馬達狀態</p>
                        <p id="m-status" class="text-sm text-blue-400 font-bold">停止中 (0.0)</p>
                    </div>
                    <div id="wiring-pic" class="bg-slate-800 h-32 rounded-xl border border-slate-700 flex items-center justify-center text-[10px] text-slate-500 p-4 text-center">
                        [ 此處顯示硬體接線示意圖 ]
                    </div>
                </div>
            </div>
            <div class="mt-auto pt-6 border-t border-slate-800 text-[10px] text-slate-500 leading-relaxed">
                學弟妹加油！如果有報錯訊息看不懂，請截圖傳給學長。
            </div>
        </aside>
    </main>

<script>
// --- 初學者專屬課程數據 ---
const lessons = [
    {
        id: 0,
        title: "認識你的大腦：宣告",
        desc: "<h2 class='text-2xl font-black mb-4'>第一步：這顆馬達叫什麼名字？</h2><p class='text-gray-600 leading-loose'>想像你在跟機器人介紹新朋友。我們要告訴機器人：『這是一個馬達，它的名字叫 <span class='bg-yellow-200 px-1 font-bold text-black'>m_motor</span>』。</p>",
        hint: "💡 教練教學：在 Java 中，我們寫類別名稱 (PWMVictorSPX) 然後空一格寫名字 (m_motor)。",
        initCode: "// 請在下方輸入：PWMVictorSPX m_motor;",
        solution: "PWMVictorSPX m_motor;",
        translate: "機器人：『喔！我知道了，有一顆馬達叫做 m_motor。』",
        wiring: "🔌 接線：請確保馬達訊號線插在 RoboRIO 的 PWM 0 位置。"
    },
    {
        id: 1,
        title: "大開殺戒：轉動！",
        desc: "<h2 class='text-2xl font-black mb-4'>第二步：命令它旋轉</h2><p class='text-gray-600 leading-loose'>有了名字後，我們就可以命令它。指令很簡單：<span class='bg-blue-100 text-blue-600 px-1 font-bold'>m_motor.set(0.5);</span></p>",
        hint: "💡 教練教學：set 括號裡面的數字代表力道。0.5 就是用 50% 的力量轉。別忘了分號 ; 像是句點。",
        initCode: "m_motor.",
        solution: "m_motor.set(0.5);",
        translate: "機器人：『收到命令！m_motor，用 50% 的力量轉起來！』",
        wiring: "🔋 電力：檢查 12V 電池電壓是否正常。"
    }
];

let state = { user: "", progress: 0 };
let currentRotation = 0;
let motorSpeed = 0;

function startJourney() {
    const name = document.getElementById('u-id').value;
    if(!name) return alert("請輸入你的名字，讓教練認識你！");
    state.user = name;
    localStorage.setItem("frc_rookie", JSON.stringify(state));
    document.getElementById('login-screen').classList.add('hidden');
    initApp();
}

function initApp() {
    document.getElementById('user-tag').innerText = `(${state.user})`;
    renderNav();
    loadLesson(state.progress);
    animateMotor();
}

function renderNav() {
    const list = document.getElementById('nav-list');
    list.innerHTML = lessons.map((l, idx) => `
        <div id="node-${idx}" onclick="loadLesson(${idx})" class="p-4 rounded-xl cursor-pointer transition text-sm ${idx === state.progress ? 'step-active font-bold text-blue-600' : 'text-gray-400 hover:bg-gray-100'}">
            <span class="text-[10px] block opacity-50">LESSON 0${idx+1}</span>
            ${l.title}
        </div>
    `).join("");
    document.getElementById('p-bar').style.width = (state.progress / (lessons.length-1) * 100) + "%";
}

function loadLesson(idx) {
    if(idx > state.progress) return; // 沒解鎖不能看
    const l = lessons[idx];
    document.getElementById('lesson-content').innerHTML = l.desc + `<div class="hint-box p-4 rounded-xl text-sm mt-4 italic">${l.hint}</div>`;
    document.getElementById('code-box').value = l.initCode;
    document.getElementById('wiring-pic').innerText = l.wiring;
    document.getElementById('translation').innerText = "等待代碼輸入...";
}

function checkAnswer() {
    const input = document.getElementById('code-box').value.trim();
    const l = lessons[state.progress];
    
    if(input.replace(/\s/g, "") === l.solution.replace(/\s/g, "")) {
        document.getElementById('translation').innerHTML = `✅ <span class='text-green-400'>${l.translate}</span>`;
        if(state.progress === 1) motorSpeed = 0.5;
        
        if(state.progress < lessons.length - 1) {
            state.progress++;
            localStorage.setItem("frc_rookie", JSON.stringify(state));
            setTimeout(() => { alert("太棒了！你剛學會了人生中第一行機器人程式碼！"); renderNav(); loadLesson(state.progress); }, 1000);
        } else {
            alert("第一階段修煉完成！你已經不是純小白了！");
        }
    } else {
        document.getElementById('translation').innerHTML = `❌ <span class='text-red-400'>語法好像怪怪的... 再檢查一下分號或大小寫？</span>`;
        motorSpeed = 0;
    }
}

function animateMotor() {
    setInterval(() => {
        if(motorSpeed > 0) {
            currentRotation += (motorSpeed * 30);
            document.getElementById('m-wheel').style.transform = `rotate(${currentRotation}deg)`;
            document.getElementById('m-status').innerText = `轉動中 (${motorSpeed})`;
            document.getElementById('m-status').classList.replace('text-blue-400', 'text-green-400');
        } else {
            document.getElementById('m-status').innerText = `停止中 (0.0)`;
            document.getElementById('m-status').classList.replace('text-green-400', 'text-blue-400');
        }
    }, 30);
}

function logout() { localStorage.removeItem("frc_rookie"); location.reload(); }

window.onload = () => {
    const saved = localStorage.getItem("frc_rookie");
    if(saved) { state = JSON.parse(saved); document.getElementById('login-screen').classList.add('hidden'); initApp(); }
};
</script>
</body>
</html>
