<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FRC Mission Control v4</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#0f172a; color:#e2e8f0;}
.card:hover { transform: translateY(-5px);}
.locked { opacity:0.3; pointer-events:none;}
</style>
</head>

<body>

<!-- Login -->
<div id="login" class="flex flex-col items-center justify-center h-screen">
<h1 class="text-2xl mb-4">登入 Mission Control</h1>
<input id="username" placeholder="輸入名字" class="text-black p-2 mb-2">
<button onclick="login()" class="bg-blue-500 px-4 py-2">登入</button>
</div>

<!-- App -->
<div id="app" class="hidden">

<nav class="bg-slate-900 p-4 flex justify-between">
<div class="text-blue-400 font-bold">🚀 FRC Mission Control</div>
<div class="space-x-4">
<button onclick="showView('dashboard')">課程</button>
<button onclick="showView('debug')">Debug</button>
<button onclick="showView('rank')">排行榜</button>
</div>
</nav>

<div class="p-6 max-w-6xl mx-auto">

<!-- Dashboard -->
<div id="dashboard">
<div id="courses" class="grid md:grid-cols-2 gap-4"></div>
</div>

<!-- Lesson -->
<div id="lesson" class="hidden">
<button onclick="showView('dashboard')">← 返回</button>
<div id="lessonContent"></div>
</div>

<!-- Debug -->
<div id="debug" class="hidden">
<h2 class="text-xl mb-2">Debug 紀錄</h2>
<input id="bug" placeholder="問題..." class="text-black p-2">
<input id="fix" placeholder="解法..." class="text-black p-2">
<button onclick="addDebug()" class="bg-green-500 px-2">新增</button>
<ul id="debugList"></ul>
</div>

<!-- Rank -->
<div id="rank" class="hidden">
<h2 class="text-xl mb-2">排行榜</h2>
<ul id="rankList"></ul>
</div>

</div>
</div>

<script>

// ===== 使用者 =====
let user = localStorage.getItem("user");

function login(){
user = document.getElementById("username").value;
localStorage.setItem("user",user);
startApp();
}

function startApp(){
document.getElementById("login").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");
renderCourses();
renderRank();
renderDebug();
}

if(user) startApp();

// ===== 課程 =====
const lessons=[
{
id:"setup",
title:"環境建置",
level:"🟢",
quiz:"wpilib",
tasks:["安裝VSCode","安裝WPILib"]
},
{
id:"basic",
title:"Java",
level:"🔵",
quiz:"int",
tasks:["寫變數","寫if"]
},
{
id:"adv",
title:"PID",
level:"🟣",
quiz:"p",
tasks:["調整PID"]
}
];

// ===== 進度 =====
let progress=JSON.parse(localStorage.getItem("progress")||"{}");

// ===== 顯示 =====
function showView(v){
["dashboard","lesson","debug","rank"].forEach(x=>{
document.getElementById(x).classList.add("hidden");
});
document.getElementById(v).classList.remove("hidden");
}

// ===== 鎖關 =====
function locked(l){
if(l.level==="🟣" && !progress["basic"]?.quiz) return true;
return false;
}

// ===== 課程列表 =====
function renderCourses(){
const el=document.getElementById("courses");

el.innerHTML=lessons.map(l=>{

let done=(progress[l.id]?.tasks||[]).length;
let total=l.tasks.length;

return `
<div class="card p-4 border border-slate-700 rounded ${locked(l)?'locked':''}"
onclick="${locked(l)?'':`openLesson('${l.id}')`}">

${l.level}
<h3>${l.title}</h3>

${locked(l)?'🔒':''}

${done}/${total}

</div>`;
}).join("");
}

// ===== 打開課程 =====
function openLesson(id){
let l=lessons.find(x=>x.id===id);
let p=progress[id]||{quiz:false,tasks:[]};

document.getElementById("lessonContent").innerHTML=`

<h2>${l.title}</h2>

<h3>Quiz（通過才解鎖任務）</h3>
<input id="q">
<button onclick="checkQuiz('${id}','${l.quiz}')">提交</button>

${p.quiz?'<p>✅ 已通過</p>':''}

<h3>任務</h3>

${l.tasks.map(t=>`
<div>
<input type="checkbox"
${p.tasks.includes(t)?"checked":""}
${!p.quiz?"disabled":""}
onclick="toggleTask('${id}','${t}')">
${t}
</div>
`).join("")}

`;

showView("lesson");
}

// ===== Quiz =====
function checkQuiz(id,ans){
let input=document.getElementById("q").value.toLowerCase();

if(input.includes(ans)){
if(!progress[id]) progress[id]={quiz:true,tasks:[]};
else progress[id].quiz=true;

save();
alert("✅ 通過");
openLesson(id);
}else{
alert("❌ 再試");
}
}

// ===== 任務 =====
function toggleTask(id,t){
let p=progress[id];
if(!p.tasks.includes(t)) p.tasks.push(t);
else p.tasks=p.tasks.filter(x=>x!==t);

save();
renderCourses();
}

// ===== Debug =====
function addDebug(){
let bug=document.getElementById("bug").value;
let fix=document.getElementById("fix").value;

let logs=JSON.parse(localStorage.getItem("debug")||"[]");
logs.push({user,bug,fix});

localStorage.setItem("debug",JSON.stringify(logs));
renderDebug();
}

function renderDebug(){
let logs=JSON.parse(localStorage.getItem("debug")||"[]");
document.getElementById("debugList").innerHTML=
logs.map(l=>`<li>${l.user}: ${l.bug} → ${l.fix}</li>`).join("");
}

// ===== 排行榜 =====
function renderRank(){
let logs=JSON.parse(localStorage.getItem("progress")||"{}");

let score=Object.entries(logs).map(([k,v])=>{
return {user,score:(v.tasks||[]).length};
});

document.getElementById("rankList").innerHTML=
score.map(s=>`<li>${s.user}: ${s.score}</li>`).join("");
}

// ===== 儲存 =====
function save(){
localStorage.setItem("progress",JSON.stringify(progress));
renderRank();
}

// 初始化
renderCourses();

</script>

</body>
</html>
