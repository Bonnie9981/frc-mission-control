<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRC Titan Workshop v14 | 完整工程師之路</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --neon-green: #39ff14;
            --bg-dark: #050608;
            --panel: #111418;
        }

        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden; /* 防止滾動，改用內部面板滾動 */
            height: 100-vh;
        }

        /* 賽博面板風格 */
        .cyber-panel {
            background: var(--panel);
            border: 1px solid #222;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            position: relative;
        }

        .cyber-panel::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-blue), transparent);
        }

        /* 無限轉動馬達 */
        .motor-container {
            position: relative;
            width: 180px; height: 180px;
        }

        .motor-core {
            width: 100%; height: 100%;
            border: 6px solid #333;
            border-radius: 50%;
            position: relative;
            transition: border-color 0.3s;
        }

        .motor-blade {
            position: absolute; top: 50%; left: 50%;
            width: 90%; height: 8px;
            background: var(--neon-blue);
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px var(--neon-blue);
        }

        /* 步驟導航 */
        .step-node {
            padding: 12px;
            border-left: 3px solid #333;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.8rem;
        }
        .step-node.active {
            border-left-color: var(--neon-blue);
            background: rgba(0, 243, 255, 0.1);
            color: var(--neon-blue);
        }
        .step-node.done { border-left-color: var(--neon-green); color: var(--neon-green); }

        /* 代碼高亮 */
        .keyword { color: #ff79c6; }
        .type { color: #8be9fd; }
        .func { color: #50fa7b; }
        .val { color: #bd93f9; }

        @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        .scanline {
            width: 100%; height: 100px; z-index: 10;
            background: linear-gradient(0deg, rgba(0, 243, 255, 0.1), transparent);
            position: absolute; top: -100px;
            animation: scan 4s linear infinite;
        }
        @keyframes scan { from { top: -100px; } to { top: 100%; } }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-72 cyber-panel flex flex-col border-r border-gray-800">
        <div class="p-6 border-b border-gray-800">
            <h2 class="text-xl font-black text-white italic tracking-tighter">MISSION_PATH</h2>
            <div class="flex items-center mt-2">
                <div class="h-1 flex-1 bg-gray-800 rounded-full overflow-hidden">
                    <div id="nav-progress" class="h-full bg-cyan-400 w-0 transition-all duration-500"></div>
                </div>
                <span id="nav-percent" class="ml-3 text-[10px] font-bold text-cyan-400">0%</span>
            </div>
        </div>
        <nav id="step-list" class="flex-1 overflow-y-auto p-4 space-y-1">
            </nav>
        <div class="p-4 bg-black/50 text-[10px] text-gray-600">
            DEVICE_STATUS: <span class="text-green-500">ONLINE</span><br>
            VERSION: 14.0.4-LATEST
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative">
        <div class="scanline"></div>

        <header class="h-20 flex items-center justify-between px-10 border-b border-gray-800 bg-black/20">
            <div>
                <h1 id="current-title" class="text-2xl font-black text-white uppercase tracking-widest">載入中...</h1>
                <p id="current-subtitle" class="text-xs text-gray-500 italic">SYSTEM_INIT...</p>
            </div>
            <div class="flex items-center space-x-8">
                <div class="text-right">
                    <p class="text-[10px] text-gray-500">CURRENT_RANK</p>
                    <p id="rank-text" class="text-sm font-bold text-purple-500">NOVICE_ENGINEER</p>
                </div>
                <button onclick="runSimulation()" class="bg-cyan-600 hover:bg-cyan-500 text-black px-6 py-2 rounded-sm font-black text-xs transition transform active:scale-95 shadow-[0_0_15px_rgba(0,243,255,0.4)]">
                    DEPLOY_CODE (F5)
                </button>
            </div>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <div class="w-3/5 p-8 overflow-y-auto space-y-8 border-r border-gray-800">
                <div id="content-area" class="space-y-6">
                    </div>

                <div class="cyber-panel p-6 rounded-lg bg-black/60 shadow-inner">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-xs font-bold text-gray-500">TITAN_IDE_v1.0</span>
                        <span class="text-[10px] text-cyan-700 underline">Robot.java</span>
                    </div>
                    <div id="editor-container" class="font-mono text-sm leading-relaxed">
                        </div>
                </div>
            </div>

            <div class="w-2/5 p-10 bg-black/40 flex flex-col items-center justify-center space-y-12">
                <div class="text-center">
                    <h3 class="text-xs font-bold text-gray-600 mb-6 tracking-widest uppercase italic">Real-Time Simulation</h3>
                    <div class="motor-container">
                        <div id="motor-core" class="motor-core">
                            <div id="motor-blade" class="motor-blade"></div>
                        </div>
                        <div class="absolute inset-0 flex items-center justify-center">
                            <span id="speed-display" class="text-2xl font-black text-white">0.0</span>
                        </div>
                    </div>
                </div>

                <div class="w-full max-w-xs space-y-4">
                    <div class="flex justify-between items-end">
                        <span class="text-[10px] text-gray-500">PWM_OUTPUT</span>
                        <span id="pwm-val" class="text-xs font-bold text-cyan-400">0.00ms</span>
                    </div>
                    <div class="h-1 w-full bg-gray-800 rounded-full overflow-hidden">
                        <div id="pwm-bar" class="h-full bg-cyan-500 w-0 transition-all duration-300"></div>
                    </div>
                    
                    <div class="p-4 bg-gray-900/50 border border-gray-800 rounded text-[10px] font-mono text-gray-400">
                        <p>> CPU_LOAD: 12%</p>
                        <p id="sim-status">> ROBO_RIO: IDLE</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 全局狀態
        let currentStepIdx = 0;
        let motorSpeed = 0; // 0 to 1
        let rotation = 0;
        let simInterval = null;

        const tutorialData = [
            {
                id: "setup",
                title: "Step 0: 裝備點收",
                subtitle: "安裝 FRC 官方開發環境 (WPILib)",
                content: `
                    <div class='bg-blue-900/10 p-4 border-l-2 border-blue-500 text-sm'>
                        要在電腦上開發 FRC，你需要安裝 <b>WPILib Installer</b>。它包含了 Java JDK、VS Code 以及所有控制馬達的 Library。
                    </div>
                    <p class='text-xs text-gray-400'>互動任務：模擬將安裝包拖入開發系統。</p>
                    <div class='h-32 border-2 border-dashed border-gray-700 flex items-center justify-center rounded-xl bg-gray-900/50 group hover:border-cyan-500 transition-all cursor-pointer' onclick="completeStep('setup')">
                        <span class='text-xs text-gray-500 group-hover:text-cyan-400'>[ 點擊模擬安裝 WPILib_v2026.exe ]</span>
                    </div>
                `,
                code: `// 環境安裝完畢後\n// 系統會自動生成目錄\n<span class='keyword'>import</span> edu.wpi.first.wpilibj.*;`,
                validate: () => true
            },
            {
                id: "variable",
                title: "Step 1: 變數與出力",
                subtitle: "理解數據的流向",
                content: `
                    <p class='text-sm text-gray-300'>程式的核心是<b>變數</b>。在控制馬達時，數值必須是 <span class='type'>double</span> (小數)。範圍是 -1.0 到 1.0。</p>
                    <div class='space-y-4'>
                        <label class='text-[10px] text-cyan-400 font-bold'>調整程式碼中的數據：</label>
                        <input type="range" min="0" max="100" value="0" class='w-full accent-cyan-500' oninput="updateSpeedValue(this.value)">
                    </div>
                `,
                code: `public void <span class='func'>robotPeriodic</span>() {\n  <span class='type'>double</span> <span class='val'>speed</span> = <span id="code-speed" class='text-white font-bold'>0.0</span>;\n  m_motor.<span class='func'>set</span>(speed);\n}`,
                validate: (val) => val > 0
            },
            {
                id: "if_logic",
                title: "Step 2: 條件判斷",
                subtitle: "讓機器人學會思考",
                content: `
                    <p class='text-sm text-gray-300'>只有在特定條件下，馬達才應該動。例如：按住搖桿。這需要 <span class='keyword'>if</span> 指令。</p>
                    <div class='flex space-x-4'>
                        <button onmousedown="handleBtn(true)" onmouseup="handleBtn(false)" class='flex-1 py-4 bg-gray-800 border border-gray-700 text-xs font-bold hover:bg-gray-700 active:bg-cyan-900'>[ 模擬控制器按鈕 1 ]</button>
                    </div>
                `,
                code: `if (m_stick.<span class='func'>getRawButton</span>(<span class='val'>1</span>)) {\n  m_motor.<span class='func'>set</span>(<span class='val'>0.8</span>);\n} else {\n  m_motor.<span class='func'>set</span>(<span class='val'>0.0</span>);\n}`,
                validate: (val) => true
            },
            {
                id: "auto",
                title: "Step 3: 自主程式 (Autonomous)",
                subtitle: "全自動控制協議",
                content: `
                    <p class='text-sm text-gray-300'>在比賽開始的前 15 秒，你不能碰搖桿。程式必須自己計算時間並動作。</p>
                    <div class='bg-purple-900/10 p-4 border-l-2 border-purple-500 text-xs'>
                        使用 Timer 來記錄時間。如果時間小於 2 秒，就一直前進。
                    </div>
                `,
                code: `<span class='keyword'>if</span> (m_timer.<span class='func'>get</span>() < <span class='val'>2.0</span>) {\n  m_drive.<span class='func'>arcadeDrive</span>(<span class='val'>0.5</span>, <span class='val'>0.0</span>);\n}`,
                validate: () => true
            }
        ];

        function initNav() {
            const list = document.getElementById('step-list');
            list.innerHTML = tutorialData.map((step, idx) => `
                <div id="node-${idx}" class="step-node ${idx === 0 ? 'active' : ''}" onclick="goToStep(${idx})">
                    <span class="text-[10px] font-bold block opacity-50">0${idx}</span>
                    ${step.title}
                </div>
            `).join("");
            loadStep(0);
            startPhysics();
        }

        function loadStep(idx) {
            currentStepIdx = idx;
            const data = tutorialData[idx];
            
            // 更新 UI
            document.querySelectorAll('.step-node').forEach(n => n.classList.remove('active'));
            document.getElementById(`node-${idx}`).classList.add('active');
            
            document.getElementById('current-title').innerText = data.title;
            document.getElementById('current-subtitle').innerText = data.subtitle;
            document.getElementById('content-area').innerHTML = data.content;
            document.getElementById('editor-container').innerHTML = `<pre class='text-gray-400'>${data.code}</pre>`;
            
            // 更新總進度
            const p = ((idx + 1) / tutorialData.length) * 100;
            document.getElementById('nav-progress').style.width = p + "%";
            document.getElementById('nav-percent').innerText = Math.round(p) + "%";
        }

        function goToStep(idx) {
            loadStep(idx);
        }

        function completeStep(id) {
            document.getElementById(`node-${currentStepIdx}`).classList.add('done');
            showToast("任務完成，系統已更新！");
            if(currentStepIdx < tutorialData.length - 1) {
                setTimeout(() => goToStep(currentStepIdx + 1), 1000);
            }
        }

        function updateSpeedValue(val) {
            motorSpeed = val / 100;
            const display = document.getElementById('code-speed');
            if(display) display.innerText = motorSpeed.toFixed(2);
            updateSimUI();
        }

        function handleBtn(isDown) {
            motorSpeed = isDown ? 0.8 : 0.0;
            updateSimUI();
        }

        function updateSimUI() {
            document.getElementById('speed-display').innerText = motorSpeed.toFixed(1);
            document.getElementById('pwm-val').innerText = (motorSpeed * 2.0).toFixed(2) + "ms";
            document.getElementById('pwm-bar').style.width = (motorSpeed * 100) + "%";
            document.getElementById('sim-status').innerText = motorSpeed > 0 ? "> RIO: EXECUTING..." : "> RIO: IDLE";
        }

        // 物理引擎：模擬 RobotPeriodic (50Hz)
        function startPhysics() {
            if(simInterval) clearInterval(simInterval);
            simInterval = setInterval(() => {
                if(motorSpeed > 0) {
                    rotation += (motorSpeed * 20); // 每 20 毫秒旋轉的角度
                    document.getElementById('motor-blade').style.transform = `translate(-50%, -50%) rotate(${rotation}deg)`;
                    document.getElementById('motor-core').style.borderColor = `var(--neon-blue)`;
                } else {
                    document.getElementById('motor-core').style.borderColor = `#333`;
                }
            }, 20); // 50Hz
        }

        function runSimulation() {
            showToast("代碼編譯中... 佈署至虛擬 RoboRIO...");
            setTimeout(() => {
                showToast("DEPLOY SUCCESSFUL!");
                completeStep(tutorialData[currentStepIdx].id);
            }, 1000);
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = "fixed bottom-10 right-1/2 transform translate-x-1/2 bg-cyan-900 border border-cyan-400 text-cyan-400 px-6 py-2 text-xs font-black z-50 shadow-[0_0_20px_rgba(0,243,255,0.4)]";
            t.innerText = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2000);
        }

        initNav();
    </script>
</body>
</html>
