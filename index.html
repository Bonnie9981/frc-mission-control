<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRC Mission Control Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .card:hover { transform: translateY(-3px); border-color: #3b82f6; transition: all 0.3s; }
        .locked { opacity: 0.4; filter: grayscale(1); pointer-events: none; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

<div id="login" class="flex flex-col items-center justify-center h-screen space-y-6">
    <div class="text-6xl">🤖</div>
    <h1 class="text-4xl font-black text-blue-400 tracking-tighter">MISSION CONTROL</h1>
    <div class="glass p-8 rounded-2xl shadow-2xl flex flex-col w-80">
        <input id="username" class="bg-slate-900 border border-slate-700 p-3 rounded-lg mb-4 text-white focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="輸入隊員代號...">
        <button onclick="login()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition shadow-lg shadow-blue-900/20">啟動系統</button>
    </div>
</div>

<div id="app" class="hidden min-h-screen">
    <nav class="bg-slate-900/80 sticky top-0 z-50 backdrop-blur-md border-b border-slate-800 p-4 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <span class="text-2xl">🚀</span>
            <span class="font-bold text-xl tracking-tight text-blue-400">FRC <span class="text-white">PRO</span></span>
        </div>
        <div class="flex space-x-6 font-medium">
            <button onclick="showView('dashboard')" class="hover:text-blue-400 transition">課程基地</button>
            <button onclick="showView('debug')" class="hover:text-blue-400 transition">維修日誌</button>
            <button onclick="showView('rank')" class="hover:text-blue-400 transition">功勳榜</button>
        </div>
        <div id="userDisplay" class="text-sm bg-slate-800 px-3 py-1 rounded-full border border-slate-700 text-slate-400"></div>
    </nav>

    <div class="p-6 max-w-7xl mx-auto">
        <div id="dashboard" class="space-y-6">
            <header class="flex justify-between items-end">
                <div>
                    <h2 class="text-3xl font-bold">訓練路線圖</h2>
                    <p class="text-slate-400">完成技術認證以解鎖高階課程</p>
                </div>
            </header>
            <div id="courses" class="grid lg:grid-cols-3 md:grid-cols-2 gap-6"></div>
        </div>

        <div id="lesson" class="hidden animate-in fade-in duration-500">
            <button onclick="showView('dashboard')" class="mb-6 text-blue-400 flex items-center hover:underline">
                <span class="mr-2">←</span> 返回作戰中心
            </button>
            <div id="lessonContent"></div>
        </div>

        <div id="debug" class="hidden space-y-6">
            <h2 class="text-3xl font-bold">🧾 Debug 紀錄庫</h2>
            <div class="glass p-6 rounded-xl grid grid-cols-1 md:grid-cols-4 gap-4">
                <select id="bugType" class="bg-slate-900 p-2 rounded border border-slate-700">
                    <option>💻 程式</option>
                    <option>⚡ 電控</option>
                    <option>🔧 機構</option>
                </select>
                <input id="bug" placeholder="發現什麼問題？" class="bg-slate-900 p-2 rounded border border-slate-700 md:col-span-1">
                <input id="fix" placeholder="最後怎麼解決的？" class="bg-slate-900 p-2 rounded border border-slate-700 md:col-span-1">
                <button onclick="addDebug()" class="bg-green-600 hover:bg-green-500 rounded font-bold transition">提交紀錄</button>
            </div>
            <div id="debugList" class="space-y-3"></div>
        </div>

        <div id="rank" class="hidden">
            <h2 class="text-3xl font-bold mb-6 text-center text-yellow-400">🏆 戰功排行榜</h2>
            <div id="rankList" class="max-w-md mx-auto space-y-4"></div>
        </div>
    </div>
</div>

<script>
// ===== 核心數據 =====
const lessons = [
    {
        id: "setup",
        title: "Mission 0: 開發環境",
        level: "🟢 Rookie",
        doc: "https://docs.wpilib.org/en/stable/docs/zero-to-robot/step-2/getting-started-with-vscode.html",
        quizQ: "在文檔中，WPILib Installer 建議安裝在哪個系統？",
        quizA: "windows",
        tasks: ["安裝 VSCode 2026", "安裝 WPILib 套件", "建立 TimedRobot 範例"]
    },
    {
        id: "basic",
        title: "Mission 1: Java 控制流",
        level: "🔵 基礎",
        doc: "https://docs.wpilib.org/en/stable/docs/software/basic-programming/java-basics.html",
        quizQ: "宣告一個整數變數的關鍵字是？",
        quizA: "int",
        tasks: ["寫出變數賦值", "實作 Joystick 按鈕判斷", "Deploy 程式到機器人"]
    },
    {
        id: "adv",
        title: "Mission 2: PID 閉迴圈控制",
        level: "🟣 進階",
        doc: "https://docs.wpilib.org/en/stable/docs/software/advanced-controls/introduction/introduction-to-pid.html",
        quizQ: "PID 中代表『消除穩態誤差』的是哪一項 (P/I/D)？",
        quizA: "i",
        tasks: ["撰寫 PIDController 物件", "調整 kP 參數直到不震盪", "整合 Encoder 數據"]
    }
];

let user = localStorage.getItem("user");
let progress = JSON.parse(localStorage.getItem("progress") || "{}");

// ===== 系統邏輯 =====
function login() {
    user = document.getElementById("username").value;
    if(!user) return alert("請輸入名號！");
    localStorage.setItem("user", user);
    startApp();
}

function startApp() {
    document.getElementById("login").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    document.getElementById("userDisplay").innerText = `當前隊員：${user}`;
    renderCourses();
    renderDebug();
    renderRank();
}

if(user) startApp();

function showView(v) {
    ["dashboard", "lesson", "debug", "rank"].forEach(id => document.getElementById(id).classList.add("hidden"));
    document.getElementById(v).classList.remove("hidden");
}

function renderCourses() {
    const el = document.getElementById("courses");
    el.innerHTML = lessons.map(l => {
        const isLocked = l.level.includes("進階") && !progress["basic"]?.quiz;
        const doneCount = (progress[l.id]?.tasks || []).length;
        const percent = Math.round((doneCount / l.tasks.length) * 100);
        
        return `
        <div class="glass p-6 rounded-2xl card cursor-pointer ${isLocked ? 'locked' : ''}" onclick="openLesson('${l.id}')">
            <div class="flex justify-between items-start mb-4">
                <span class="text-xs font-bold px-2 py-1 bg-slate-800 rounded text-blue-400">${l.level}</span>
                ${isLocked ? '<span>🔒</span>' : '<span class="text-green-500">🔓</span>'}
            </div>
            <h3 class="text-xl font-bold mb-2">${l.title}</h3>
            <div class="w-full bg-slate-800 h-2 rounded-full mt-4">
                <div class="bg-blue-500 h-2 rounded-full transition-all duration-500" style="width: ${percent}%"></div>
            </div>
            <p class="text-xs text-slate-500 mt-2">進度：${percent}%</p>
        </div>`;
    }).join("");
}

function openLesson(id) {
    const l = lessons.find(x => x.id === id);
    const p = progress[id] || { quiz: false, tasks: [] };
    
    document.getElementById("lessonContent").innerHTML = `
    <div class="grid lg:grid-cols-2 gap-8">
        <div class="space-y-4">
            <div class="glass p-4 rounded-xl">
                <h3 class="font-bold mb-2 flex items-center"><span class="mr-2">📖</span> 官方文檔對照</h3>
                <iframe src="${l.doc}" class="w-full h-[500px] rounded-lg border border-slate-700 bg-white"></iframe>
            </div>
        </div>
        <div class="space-y-6">
            <div class="glass p-6 rounded-xl border-l-4 border-yellow-500">
                <h3 class="text-lg font-bold mb-4 text-yellow-400">知識驗證 Quiz</h3>
                <p class="text-sm text-slate-400 mb-3">${l.quizQ}</p>
                <div class="flex space-x-2">
                    <input id="qInput" class="bg-slate-900 border border-slate-700 p-2 rounded flex-grow text-white" placeholder="輸入關鍵字...">
                    <button onclick="checkQuiz('${id}', '${l.quizA}')" class="bg-yellow-600 px-6 py-2 rounded font-bold">提交</button>
                </div>
                ${p.quiz ? '<p class="text-green-400 text-sm mt-3 font-bold">✅ 驗證成功！實作權限已解鎖。</p>' : ''}
            </div>

            <div class="glass p-6 rounded-xl ${!p.quiz ? 'opacity-20 pointer-events-none' : ''}">
                <h3 class="text-lg font-bold mb-4 text-blue-400">🛠️ 實作任務 (需 Mentor 現場確認)</h3>
                ${l.tasks.map(t => `
                    <div class="flex items-center space-x-3 mb-3 p-3 bg-slate-900/50 rounded-lg border border-slate-800">
                        <input type="checkbox" class="w-5 h-5 accent-blue-500" ${p.tasks.includes(t) ? 'checked' : ''} onchange="toggleTask('${id}', '${t}')">
                        <span class="${p.tasks.includes(t) ? 'line-through text-slate-500' : ''}">${t}</span>
                    </div>
                `).join("")}
            </div>
        </div>
    </div>`;
    showView("lesson");
}

function checkQuiz(id, ans) {
    const input = document.getElementById("qInput").value.toLowerCase();
    if(input.includes(ans)) {
        if(!progress[id]) progress[id] = { quiz: true, tasks: [] };
        else progress[id].quiz = true;
        save();
        alert("🎉 完美！你具備了實作的理論基礎。");
        openLesson(id);
    } else {
        alert("❌ 答案就在左側文檔中，再仔細看看！");
    }
}

function toggleTask(id, t) {
    if(!progress[id].tasks.includes(t)) progress[id].tasks.push(t);
    else progress[id].tasks = progress[id].tasks.filter(x => x !== t);
    save();
    renderCourses();
}

function addDebug() {
    const type = document.getElementById("bugType").value;
    const bug = document.getElementById("bug").value;
    const fix = document.getElementById("fix").value;
    if(!bug || !fix) return;

    const logs = JSON.parse(localStorage.getItem("debug") || "[]");
    logs.unshift({ user, type, bug, fix, time: new Date().toLocaleDateString() });
    localStorage.setItem("debug", JSON.stringify(logs));
    renderDebug();
}

function renderDebug() {
    const logs = JSON.parse(localStorage.getItem("debug") || "[]");
    document.getElementById("debugList").innerHTML = logs.map(l => `
    <div class="glass p-4 rounded-lg flex justify-between items-center border-l-2 border-green-500">
        <div>
            <span class="text-xs font-mono text-slate-500">${l.time} | ${l.user}</span>
            <div class="font-bold"><span class="text-blue-400">${l.type}:</span> ${l.bug}</div>
            <div class="text-sm text-green-400 italic">Solution: ${l.fix}</div>
        </div>
    </div>`).join("");
}

function renderRank() {
    let totalScore = 0;
    Object.values(progress).forEach(v => totalScore += (v.tasks?.length || 0));
    
    document.getElementById("rankList").innerHTML = `
    <div class="glass p-6 rounded-2xl flex justify-between items-center border-2 border-yellow-500 shadow-lg shadow-yellow-900/10">
        <div class="flex items-center space-x-4">
            <span class="text-3xl">🥇</span>
            <div>
                <div class="font-black text-xl">${user}</div>
                <div class="text-xs text-slate-400 uppercase tracking-widest">Master Technician</div>
            </div>
        </div>
        <div class="text-4xl font-black text-yellow-500">${totalScore * 10}<span class="text-sm ml-1 text-slate-500">pts</span></div>
    </div>
    <p class="text-center text-slate-500 text-xs mt-4 italic">排行榜數據同步中 (模擬單機環境)</p>`;
}

function save() {
    localStorage.setItem("progress", JSON.stringify(progress));
    renderRank();
}

renderCourses();
</script>
</body>
</html>
