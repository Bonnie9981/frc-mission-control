<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRC Mission Control v9 | Engineer Awakening</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background: #020617; color: #e2e8f0; font-family: 'JetBrains Mono', monospace; }
        .eng-card { background: #0f172a; border-left: 4px solid #334155; transition: 0.3s; }
        .eng-card:hover { border-left-color: #3b82f6; background: #1e293b; }
        .debug-box { background: #450a0a; border: 1px solid #991b1b; padding: 10px; font-size: 0.8rem; color: #fca5a5; }
        .logic-tag { background: #1e3a8a; color: #bfdbfe; font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; }
        .action-tag { background: #064e3b; color: #a7f3d0; font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; }
        .completed { opacity: 0.5; border-left-color: #10b981 !important; }
    </style>
</head>
<body class="p-4 md:p-8">

    <nav class="max-w-5xl mx-auto mb-8 flex justify-between items-center border-b border-slate-800 pb-4">
        <div>
            <h1 class="text-2xl font-black tracking-tighter text-blue-500 underline decoration-double">MISSION_CONTROL_v9</h1>
            <p class="text-xs text-slate-500 uppercase">Status: Engineering Mode Active</p>
        </div>
        <div id="progressStatus" class="text-right text-sm">
            <span class="text-slate-500 font-bold">系統完整度:</span>
            <span id="completionRate" class="text-blue-400 font-black">0%</span>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto space-y-12">
        
        <section id="curriculum" class="space-y-6">
            </section>

    </main>

    <div id="debugModal" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4">
        <div class="bg-slate-900 border-2 border-red-900 p-8 rounded-xl max-w-lg w-full shadow-2xl">
            <h2 class="text-red-500 font-bold text-xl mb-4 flex items-center">
                <span class="mr-2">⚠</span> 系統警報：編譯失敗 (Build Failed)
            </h2>
            <div class="debug-box mb-6">
                <code>> Task :compileJava FAILED<br>Robot.java:25: error: ';' expected<br>  PWMVictorSPX m_left = new PWMVictorSPX(0)<br>                                          ^</code>
            </div>
            <p class="text-sm text-slate-400 mb-6">這是在 FRC 最常見的錯誤之一。請告訴教練，你觀察到了什麼？該如何修正？</p>
            <input id="debugAnswer" class="w-full bg-slate-950 border border-slate-700 p-3 rounded mb-4 outline-none focus:border-red-500" placeholder="輸入你的修正方案...">
            <button onclick="solveDebug()" class="w-full bg-red-700 hover:bg-red-600 font-bold py-3 rounded transition uppercase">提交修正指令</button>
        </div>
    </div>

<script>
// ===== 工程師修煉資料庫 (v9 重製) =====
const missions = [
    {
        id: "m0",
        title: "Phase 0: 建立通訊與環境",
        description: "目標：不只是安裝軟體，而是理解『程式如何變成動作』。",
        tasks: [
            { type: "action", text: "下載並安裝 WPILib Installer (包含所有工具集)" },
            { type: "logic", text: "🧠 理解：為什麼要安裝 JDK？(Java 是編譯語言，JDK 是你的翻譯官)" },
            { type: "action", text: "建立 TimedRobot 專案並點擊 Build (確認輸出視窗出現 BUILD SUCCESSFUL)" },
            { type: "debug", text: "💥 故意刪掉 Robot.java 第 25 行末的分號，再次 Build，觀察錯誤訊息" },
            { type: "logic", text: "🧠 思考：當看到 'error: ; expected' 時，你應該檢查哪裡？" }
        ],
        quiz: {
            q: "Build Success 代表什麼？",
            a: "程式語法正確且已轉成機器碼"
        }
    },
    {
        id: "m1",
        title: "Phase 1: 變數與電控邏輯",
        description: "目標：理解程式中的數值如何對應到現實世界的馬達埠號。",
        tasks: [
            { type: "action", text: "在 Constants.java 定義一個變數 kLeftMotorPort = 0" },
            { type: "logic", text: "🧠 理解：為什麼埠號不能隨便改？(硬體接線決定了程式的數字)" },
            { type: "action", text: "練習撰寫 if (joystick.getRawButton(1)) 邏輯" },
            { type: "debug", text: "💥 嘗試將埠號設為 -1 並編譯，觀察機器人的反應或報錯訊息" },
            { type: "action", text: "在代碼中加入 System.out.println 印出搖桿數值，觀察終端機" }
        ],
        quiz: {
            q: "為什麼要把埠號寫在 Constants.java 而不是直接寫在 Robot.java？",
            a: "方便統一管理與避免硬編碼錯誤"
        }
    }
];

let progress = JSON.parse(localStorage.getItem("v9_data") || "{}");
let currentDebugMission = null;

function render() {
    const container = document.getElementById("curriculum");
    let total = 0;
    let done = 0;

    container.innerHTML = missions.map(m => {
        const p = progress[m.id] || { tasks: [], quiz: false };
        
        return `
        <div class="space-y-4">
            <div class="flex items-end justify-between">
                <div>
                    <h2 class="text-xl font-black text-blue-400 uppercase">${m.title}</h2>
                    <p class="text-xs text-slate-500 italic">${m.description}</p>
                </div>
                <div class="text-[10px] bg-slate-800 px-2 py-1 rounded">DECODED: ${p.tasks.length}/${m.tasks.length}</div>
            </div>

            <div class="grid gap-2">
                ${m.tasks.map((t, i) => {
                    total++;
                    const isDone = p.tasks.includes(i);
                    if(isDone) done++;
                    
                    let tag = "";
                    let clickAction = `onclick="toggleTask('${m.id}', ${i}, '${t.type}')"`;
                    
                    if(t.type === "logic") tag = '<span class="logic-tag">LOGIC</span>';
                    if(t.type === "action") tag = '<span class="action-tag">ACTION</span>';
                    if(t.type === "debug") tag = '<span class="bg-red-900 text-red-200 text-[10px] px-2 rounded">DEBUG</span>';

                    return `
                    <div class="eng-card p-4 rounded flex items-center justify-between cursor-pointer ${isDone ? 'completed' : ''}" ${clickAction}>
                        <div class="flex items-center space-x-3 text-sm">
                            <div class="w-4 h-4 border border-slate-600 rounded flex items-center justify-center text-[10px]">
                                ${isDone ? '✔' : ''}
                            </div>
                            <div>${tag} <span class="ml-2">${t.text}</span></div>
                        </div>
                    </div>`;
                }).join("")}
            </div>

            <div class="p-4 bg-slate-900/50 border border-dashed border-slate-700 rounded text-center">
                <p class="text-xs text-slate-500 mb-2">Phase Verification Required</p>
                ${p.quiz ? 
                    '<span class="text-green-500 font-bold text-sm italic">>>> VERIFIED BY COACH</span>' : 
                    `<button onclick="verifyPhase('${m.id}')" class="text-xs bg-blue-900/30 text-blue-400 border border-blue-800 px-4 py-1 rounded hover:bg-blue-800 hover:text-white transition">點此進行階段認證</button>`
                }
            </div>
        </div>
        `;
    }).join("");

    document.getElementById("completionRate").innerText = Math.round((done/total)*100) + "%";
}

function toggleTask(mId, tIdx, type) {
    if(type === "debug" && !progress[mId]?.tasks.includes(tIdx)) {
        currentDebugMission = { mId, tIdx };
        document.getElementById("debugModal").classList.remove("hidden");
        return;
    }

    if(!progress[mId]) progress[mId] = { tasks: [], quiz: false };
    const taskIdx = progress[mId].tasks.indexOf(tIdx);
    
    if(taskIdx === -1) progress[mId].tasks.push(tIdx);
    else progress[mId].tasks.splice(taskIdx, 1);
    
    save();
}

function solveDebug() {
    const ans = document.getElementById("debugAnswer").value.toLowerCase();
    if(ans.includes("分號") || ans.includes(";") || ans.includes("semicolon")) {
        const { mId, tIdx } = currentDebugMission;
        if(!progress[mId]) progress[mId] = { tasks: [], quiz: false };
        progress[mId].tasks.push(tIdx);
        save();
        document.getElementById("debugModal").classList.add("hidden");
        document.getElementById("debugAnswer").value = "";
        alert("教練：正確！在 Java 裡，分號就是這行指令的句點。少了一個，編譯器就看不懂了。");
    } else {
        alert("教練：答案不對，再看一次報錯訊息！它說 expected 了什麼？");
    }
}

function verifyPhase(mId) {
    const m = missions.find(x => x.id === mId);
    const ans = prompt(`【階段認證】\n問題：${m.quiz.q}`);
    
    if(ans && ans.length > 5) {
        progress[mId].quiz = true;
        save();
        alert("教練：認證成功。記住，不只要會寫 code，還要知道 code 背後的理由。");
    } else {
        alert("教練：解釋得太敷衍了，請重新思考後再回答。");
    }
}

function save() {
    localStorage.setItem("v9_data", JSON.stringify(progress));
    render();
}

// 啟動
render();
</script>

</body>
</html>
